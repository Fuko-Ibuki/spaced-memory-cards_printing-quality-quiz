<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Spaced Memory Cards</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='18' y='10' width='64' height='80' rx='10' fill='%23F5EEDC'/%3E%3Crect x='30' y='30' width='40' height='6' rx='3' fill='%23C9A227'/%3E%3Crect x='30' y='46' width='40' height='6' rx='3' fill='%23D8CBA5'/%3E%3Crect x='30' y='62' width='24' height='6' rx='3' fill='%23D8CBA5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400..600;1,400..600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   0. 重置 & 基础
   ============================================================ */
*,*::before,*::after{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
ul,ol{ margin:0; padding:0; list-style:none; }
button{ font-family:inherit; }
input,textarea{ font-family:inherit; }
img,svg{ display:block; max-width:100%; }
a{ color:inherit; }
::selection{ background:var(--accent-glow); }

/* ============================================================
   1. 设计令牌 (Design Tokens)
   ============================================================ */
:root{
  /* -- 明快主题基调（多邻国式活力绿 + Anki纸感卡片） -- */
  --bg:#12161b;
  --bg-elevated:#1a2029;
  --bg-soft:#212832;
  --bg-hover:#2a323d;
  --border:#2e3640;
  --border-soft:#242b34;

  --paper:#f5eedc;
  --paper-alt:#ece1c4;
  --paper-line:#ddd0ab;
  --ink:#26201a;
  --ink-soft:#6c6250;
  --ink-faint:#9b9078;

  --text:#eef1f3;
  --text-soft:#a7afb8;
  --text-faint:#707a84;

  --accent:#58c46e;
  --accent-strong:#4bb862;
  --accent-shade:#2f8f45;
  --accent-ink:#ffffff;
  --accent-glow:rgba(88,196,110,.30);
  --ambient-glow:rgba(255,201,60,.16);

  --success:#58c46e;
  --success-bg:rgba(88,196,110,.16);
  --success-strong:#7ddb90;
  --danger:#ef5b5b;
  --danger-bg:rgba(239,91,91,.16);
  --danger-strong:#ff8686;
  --info:#4fa6e0;
  --info-bg:rgba(79,166,224,.18);
  --info-strong:#7cc0ec;
  --gold:#ffc93c;
  --gold-bg:rgba(255,201,60,.16);
  --gold-ink:#3a2a02;

  --shadow-card:0 20px 60px -15px rgba(0,0,0,.55), 0 2px 8px rgba(0,0,0,.35);
  --shadow-pop:0 10px 30px -8px rgba(0,0,0,.45);
  --shadow-glow:0 0 0 1px rgba(255,201,60,.16), 0 20px 70px -10px rgba(255,201,60,.22);

  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:26px;
  --radius-pill:999px;

  --ease:cubic-bezier(.22,.9,.32,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --dur-fast:.15s;
  --dur:.32s;
  --dur-slow:.5s;

  --font-display:"Noto Serif SC",serif;
  --font-num:"Newsreader",serif;
  color-scheme:dark;
}

html[data-theme="light"]{
  --bg:#f7f8f2;
  --bg-elevated:#ffffff;
  --bg-soft:#eef2ea;
  --bg-hover:#e2e9dd;
  --border:#dde5d7;
  --border-soft:#e8eee3;

  --paper:#ffffff;
  --paper-alt:#f4f0e6;
  --paper-line:#e6e0cf;
  --ink:#26201a;
  --ink-soft:#6c6250;
  --ink-faint:#9b9078;

  --text:#212b22;
  --text-soft:#57624f;
  --text-faint:#8a9482;

  --accent:#3dae5a;
  --accent-strong:#329a4c;
  --accent-shade:#1f7a38;
  --accent-ink:#ffffff;
  --accent-glow:rgba(61,174,90,.20);
  --ambient-glow:rgba(240,165,0,.12);

  --success:#3dae5a;
  --success-bg:rgba(61,174,90,.12);
  --success-strong:#1f7a38;
  --danger:#e2483f;
  --danger-bg:rgba(226,72,63,.12);
  --danger-strong:#b83128;
  --info:#3f8fd6;
  --info-bg:rgba(63,143,214,.12);
  --info-strong:#2a6ba8;
  --gold:#f0a500;
  --gold-bg:rgba(240,165,0,.14);
  --gold-ink:#3a2a02;

  --shadow-card:0 20px 50px -18px rgba(38,32,20,.22), 0 2px 8px rgba(38,32,20,.10);
  --shadow-pop:0 10px 26px -10px rgba(38,32,20,.18);
  --shadow-glow:0 0 0 1px rgba(240,165,0,.14), 0 16px 50px -12px rgba(240,165,0,.18);
  color-scheme:light;
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.001ms !important;
    scroll-behavior:auto !important;
  }
}

/* ============================================================
   2. 基础版式
   ============================================================ */
body{
  background:var(--bg);
  color:var(--text);
  transition:background var(--dur) var(--ease),color var(--dur) var(--ease);
}
body::before{
  /* 环境氛围：极淡的暖光晕，呼应"台灯"概念 */
  content:"";
  position:fixed; inset:0;
  background:radial-gradient(ellipse 900px 600px at 50% -8%, var(--ambient-glow), transparent 60%);
  opacity:.5;
  pointer-events:none;
  z-index:0;
}
html[data-theme="light"] body::before{ opacity:.35; }

h1,h2,h3,h4{ margin:0; font-family:var(--font-display); font-weight:600; letter-spacing:.01em; }
.num{ font-family:var(--font-num); font-style:italic; font-weight:500; }

:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:3px;
  border-radius:6px;
}
button:focus-visible{ outline-offset:2px; }

/* ============================================================
   3. 应用外壳 / 顶部导航
   ============================================================ */
#app-root{ position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

.topnav{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:18px;
  padding:14px 22px;
  background:color-mix(in srgb, var(--bg-elevated) 88%, transparent);
  backdrop-filter:blur(14px) saturate(1.2);
  border-bottom:1px solid var(--border-soft);
}
.brand{
  display:flex; align-items:center; gap:10px;
  font-family:var(--font-display); font-weight:700; font-size:16.5px;
  letter-spacing:.01em;
  color:var(--text);
  white-space:nowrap;
}
.brand .brand-mark{
  display:inline-flex; align-items:center; justify-content:center;
  width:28px;height:28px; border-radius:9px;
  background:linear-gradient(155deg,var(--accent-strong),var(--accent));
  color:var(--accent-ink); font-size:15px;
  transform:rotate(-6deg);
  box-shadow:0 4px 10px -3px rgba(0,0,0,.35);
}
.nav-spacer{ flex:1; }

.streak-pill{
  display:flex; align-items:center; gap:6px;
  padding:6px 12px 6px 9px;
  border-radius:var(--radius-pill);
  background:var(--gold-bg);
  color:var(--gold);
  font-size:13px; font-weight:600;
  border:1px solid color-mix(in srgb, var(--gold) 40%, transparent);
  white-space:nowrap;
}
.streak-pill .flame{ font-size:14px; filter:drop-shadow(0 0 6px color-mix(in srgb, var(--gold) 60%, transparent)); }
.streak-pill.bump{ animation:streakBump .5s var(--ease-spring); }
@keyframes streakBump{ 0%{transform:scale(1)} 35%{transform:scale(1.28)} 100%{transform:scale(1)} }

.nav-tabs{ display:flex; gap:4px; background:var(--bg-soft); padding:4px; border-radius:var(--radius-pill); border:1px solid var(--border-soft); }
.nav-tab{
  border:none; background:transparent; cursor:pointer;
  padding:7px 16px; border-radius:var(--radius-pill);
  font-size:13.5px; font-weight:600; color:var(--text-soft);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.nav-tab:hover{ color:var(--text); }
.nav-tab.active{ background:var(--accent); color:var(--accent-ink); }

.icon-btn{
  width:34px;height:34px; border-radius:50%;
  border:1px solid var(--border-soft); background:var(--bg-soft); color:var(--text-soft);
  display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px;
  transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.icon-btn:hover{ background:var(--bg-hover); color:var(--text); transform:translateY(-1px); }

main#view{ flex:1; display:flex; flex-direction:column; }

/* ============================================================
   4. 按钮
   ============================================================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border-radius:var(--radius-pill);
  border:none;
  padding:12px 22px;
  font-size:14.5px; font-weight:700;
  cursor:pointer;
  transition:transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease), opacity var(--dur-fast) var(--ease);
  white-space:nowrap;
  user-select:none;
}
.btn:active:not(:disabled){ transform:translateY(3px); }
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
.btn-primary{ background:var(--accent); color:var(--accent-ink); box-shadow:0 4px 0 0 var(--accent-shade); }
.btn-primary:hover:not(:disabled){ background:var(--accent-strong); }
.btn-primary:active:not(:disabled){ box-shadow:0 1px 0 0 var(--accent-shade); }
.btn-secondary{ background:var(--bg-soft); color:var(--text); box-shadow:0 4px 0 0 var(--border); }
.btn-secondary:hover:not(:disabled){ background:var(--bg-hover); }
.btn-secondary:active:not(:disabled){ box-shadow:0 1px 0 0 var(--border); }
.btn-ghost{ background:transparent; color:var(--text-soft); box-shadow:none !important; }
.btn-ghost:hover:not(:disabled){ color:var(--text); background:var(--bg-soft); }
.btn-ghost:active:not(:disabled){ transform:scale(.96); }
.btn-danger{ background:var(--danger-bg); color:var(--danger-strong); box-shadow:0 4px 0 0 color-mix(in srgb, var(--danger) 30%, transparent); }
.btn-danger:hover:not(:disabled){ background:color-mix(in srgb, var(--danger) 22%, transparent); }
.btn-danger:active:not(:disabled){ box-shadow:0 1px 0 0 color-mix(in srgb, var(--danger) 30%, transparent); }
.btn-block{ width:100%; }
.btn-lg{ padding:16px 28px; font-size:16px; }
.kbd{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:18px; height:18px; padding:0 4px;
  border-radius:5px; font-size:10.5px; font-weight:700;
  background:rgba(0,0,0,.18); color:inherit; opacity:.65;
  font-family:-apple-system,sans-serif;
}
.btn-primary .kbd{ background:rgba(0,0,0,.16); }

/* ============================================================
   5. 通用容器 / 面板
   ============================================================ */
.container{ max-width:880px; margin:0 auto; width:100%; padding:0 20px; }
.panel{
  background:var(--bg-elevated);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);
  padding:26px;
}
.section-title{
  font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--text-faint); margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.section-title .line{ flex:1; height:1px; background:var(--border-soft); }
.muted{ color:var(--text-soft); }
.center-col{ display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:40px 20px; text-align:center; }

/* ============================================================
   6. 加载 / 拖拽题库
   ============================================================ */
.dropzone{
  width:100%; max-width:640px;
  border:2px dashed var(--border);
  border-radius:var(--radius-lg);
  padding:52px 30px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  background:var(--bg-elevated);
  transition:border-color var(--dur) var(--ease), background var(--dur) var(--ease), transform var(--dur) var(--ease);
  cursor:pointer;
}
.dropzone:hover{ border-color:var(--accent); }
.dropzone.dragover{
  border-color:var(--accent);
  background:var(--accent-glow);
  transform:scale(1.015);
}
.dropzone .dz-icon{
  width:64px;height:64px; border-radius:var(--radius-md);
  background:linear-gradient(160deg,var(--paper),var(--paper-alt));
  display:flex; align-items:center; justify-content:center;
  font-size:28px; box-shadow:var(--shadow-pop);
  transform:rotate(-4deg);
}
.dropzone h3{ font-size:19px; color:var(--text); }
.dropzone p{ margin:0; color:var(--text-soft); font-size:13.5px; line-height:1.6; }
.dz-hint{ font-size:12px; color:var(--text-faint); margin-top:2px; }
.hidden-input{ position:absolute; width:1px;height:1px; opacity:0; overflow:hidden; }

.demo-link{
  margin-top:18px; font-size:13px; color:var(--text-faint);
  display:flex; align-items:center; gap:8px;
}
.demo-link button{ background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-size:13px;padding:0; text-decoration:underline; text-decoration-color:transparent; transition:text-decoration-color .15s; }
.demo-link button:hover{ text-decoration-color:var(--accent); }

.load-error{
  margin-top:16px; max-width:640px; width:100%;
  background:var(--danger-bg); border:1px solid color-mix(in srgb, var(--danger) 35%, transparent); color:var(--danger-strong);
  border-radius:var(--radius-md); padding:14px 16px; font-size:13px; line-height:1.7; text-align:left;
  white-space:pre-wrap;
}

/* ============================================================
   7. 设置 / 学习模式选择
   ============================================================ */
.deck-info-card{
  display:flex; align-items:center; gap:16px;
  padding:18px 20px; border-radius:var(--radius-lg);
  background:linear-gradient(155deg,var(--paper),var(--paper-alt));
  color:var(--ink); box-shadow:var(--shadow-pop); margin-bottom:26px;
}
.deck-info-card .deck-emoji{ font-size:30px; }
.deck-info-card h2{ font-size:19px; color:var(--ink); }
.deck-info-card p{ margin:4px 0 0; font-size:12.5px; color:var(--ink-soft); line-height:1.6; }
.deck-info-card .swap{ margin-left:auto; }

.mode-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
.mode-card{
  position:relative; text-align:left; cursor:pointer;
  border:1.5px solid var(--border); border-radius:var(--radius-lg);
  background:var(--bg-elevated); padding:18px 16px 16px;
  transition:border-color var(--dur) var(--ease), transform var(--dur) var(--ease), background var(--dur) var(--ease);
}
.mode-card:hover{ transform:translateY(-2px); border-color:var(--border); background:var(--bg-soft); }
.mode-card.selected{ border-color:var(--accent); background:linear-gradient(160deg,var(--accent-glow),transparent); box-shadow:0 0 0 1px var(--accent) inset; }
.mode-card .mode-icon{ font-size:22px; margin-bottom:10px; display:block; }
.mode-card h4{ font-size:15px; color:var(--text); margin-bottom:5px; }
.mode-card p{ margin:0; font-size:12px; color:var(--text-soft); line-height:1.6; min-height:48px; }
.mode-card .mode-tag{ display:inline-block; margin-top:10px; font-size:10.5px; padding:3px 8px; border-radius:var(--radius-pill); background:var(--bg-soft); color:var(--text-faint); font-weight:600; }
.mode-card.selected .mode-tag{ background:var(--accent); color:var(--accent-ink); }

.setup-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:720px){ .setup-grid{ grid-template-columns:1fr; } .mode-grid{ grid-template-columns:1fr; } }

.type-chip{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 14px; border-radius:var(--radius-pill);
  border:1.5px solid var(--border); background:var(--bg-soft); color:var(--text-soft);
  font-size:13px; font-weight:600; cursor:pointer; user-select:none;
  transition:all var(--dur-fast) var(--ease);
}
.type-chip .cnt{ font-family:var(--font-num); font-style:italic; opacity:.75; font-size:12px; }
.type-chip.on{ border-color:var(--accent); background:var(--accent-glow); color:var(--text); }
.type-chip.on .chip-check{ color:var(--accent); }
.chips-row{ display:flex; flex-wrap:wrap; gap:9px; }
.tf-filter-row{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border-soft); }
.tf-filter-label{ font-size:12px; color:var(--text-faint); }

.toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--border-soft); }
.toggle-row:last-child{ border-bottom:none; }
.toggle-row .label{ font-size:14px; color:var(--text); font-weight:600; }
.toggle-row .desc{ font-size:12px; color:var(--text-faint); margin-top:2px; }
.switch{ position:relative; width:42px; height:24px; border-radius:var(--radius-pill); background:var(--bg-soft); border:1px solid var(--border); cursor:pointer; flex-shrink:0; transition:background var(--dur) var(--ease); }
.switch.on{ background:var(--accent); border-color:var(--accent); }
.switch .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--text); transition:transform var(--dur) var(--ease-spring), background var(--dur) var(--ease); }
.switch.on .knob{ transform:translateX(18px); background:var(--accent-ink); }

.qty-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.seg{ display:flex; background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius-pill); padding:3px; }
.seg button{ border:none; background:transparent; padding:7px 14px; border-radius:var(--radius-pill); font-size:12.5px; font-weight:600; color:var(--text-soft); cursor:pointer; }
.seg button.active{ background:var(--accent); color:var(--accent-ink); }
.num-input{
  width:76px; padding:8px 10px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--bg-soft); color:var(--text); font-size:13px; text-align:center;
}

.collapsible-head{
  display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
  padding:8px 6px; margin:-8px -6px; border-radius:var(--radius-sm);
  font-size:14.5px; font-weight:700; color:var(--text);
  transition:background var(--dur-fast) var(--ease);
}
.collapsible-head:hover{ background:var(--bg-soft); }
.collapsible-head .chev{ transition:transform var(--dur) var(--ease); font-size:13px; color:var(--text-faint); flex-shrink:0; }
.collapsible-head.open .chev{ transform:rotate(90deg); color:var(--accent); }
.collapsible-body{ overflow:hidden; max-height:0; transition:max-height var(--dur-slow) var(--ease); }
.collapsible-body.open{ max-height:600px; }
.adv-panel{ margin-top:16px; }
.points-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:16px; }
.points-item{ display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--bg-soft); padding:10px 12px; border-radius:var(--radius-md); border:1px solid var(--border-soft); }
.points-item span{ font-size:12.5px; color:var(--text-soft); }
.mock-preview{ margin-top:12px; padding:13px 15px; background:var(--accent-glow); border:1px solid rgba(88,196,110,.3); border-radius:var(--radius-md); font-size:12.5px; color:var(--text-soft); line-height:1.7; }
.mock-preview b{ color:var(--accent-strong); font-family:var(--font-num); font-style:italic; }

.start-bar{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:28px; padding-top:22px; border-top:1px solid var(--border-soft); }
.start-bar .est{ font-size:12.5px; color:var(--text-faint); }
.start-bar .est b{ color:var(--text); font-family:var(--font-num); font-style:italic; font-size:15px; }

/* ============================================================
   8. 答题卡片流 (核心界面)
   ============================================================ */
.quiz-shell{ flex:1; display:flex; flex-direction:column; }
.quiz-topbar{ display:flex; align-items:center; gap:14px; padding:16px 22px 6px; }
.progress-track{ flex:1; height:6px; border-radius:var(--radius-pill); background:var(--bg-soft); overflow:hidden; }
.progress-fill{ height:100%; border-radius:var(--radius-pill); background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width var(--dur-slow) var(--ease); }
.progress-label{ font-size:12.5px; color:var(--text-faint); white-space:nowrap; font-family:var(--font-num); font-style:italic; }
.quiz-exit{ font-size:12.5px; }

.card-stage{
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:22px 20px 40px; position:relative;
}
.card-stack{ position:relative; width:100%; max-width:600px; }
.card-stack::before, .card-stack::after{
  content:""; position:absolute; left:50%; right:0; border-radius:var(--radius-lg);
  background:var(--paper-alt); opacity:.55;
}
.card-stack::before{ top:-8px; width:94%; height:100%; transform:translateX(-50%) scale(.98); z-index:-1; opacity:.5;}
.card-stack::after{ top:-16px; width:88%; height:100%; transform:translateX(-50%) scale(.96); z-index:-2; opacity:.3;}

.qcard{
  position:relative; z-index:1;
  background:linear-gradient(165deg,var(--paper),var(--paper-alt) 130%);
  color:var(--ink);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card), var(--shadow-glow);
  padding:38px 34px 30px;
  min-height:320px;
  display:flex; flex-direction:column;
  animation:cardIn .4s var(--ease);
}
@keyframes cardIn{ from{ opacity:0; transform:translateY(5px) scale(.994); } to{ opacity:1; transform:none; } }
.qcard.leaving{ animation:cardOut .12s ease forwards !important; }
@keyframes cardOut{ from{ opacity:1; } to{ opacity:0; } }
.qcard.flipping{ animation:cardFlip .38s var(--ease); }
@keyframes cardFlip{ 0%{ transform:scale(1) rotateX(0); opacity:1; } 45%{ transform:scale(.98) rotateX(5deg); opacity:.75;} 100%{ transform:scale(1) rotateX(0); opacity:1; } }
.qcard.shake{ animation:cardShake .32s ease; }
@keyframes cardShake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(3px)} }
.qcard.pulse-good{ box-shadow:var(--shadow-card), 0 0 0 3px var(--success); }
.qcard.pulse-bad{ box-shadow:var(--shadow-card), 0 0 0 3px var(--danger); }

.qcard-type{ font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.qcard-type .dot{ width:5px;height:5px;border-radius:50%; background:currentColor; }
.qcard-question{ font-family:var(--font-display); font-size:22px; line-height:1.65; color:var(--ink); font-weight:500; flex:0 0 auto; white-space:pre-wrap; }
.qcard-question .blank{ display:inline-block; width:56px; height:1.05em; vertical-align:-4px; border-bottom:3px solid var(--ink-faint); border-radius:0; margin:0 2px; }

.blank-wrap{ position:relative; display:inline-block; min-width:96px; vertical-align:-6px; margin:0 2px; }
.qcard-blank-input{
  border:none; background:transparent; width:100%; box-sizing:border-box;
  font-family:var(--font-display); font-size:22px; color:var(--ink); text-align:center;
  padding:0 4px 6px; outline:none;
}
.blank-underline{ position:absolute; left:2px; right:2px; bottom:2px; height:3px; background:var(--ink-faint); border-radius:0; transition:background var(--dur-fast) var(--ease), border-radius var(--dur-fast) var(--ease); }
.qcard-blank-input:focus + .blank-underline{ background:var(--accent); border-radius:var(--radius-pill); }
.qcard-blank-input.correct + .blank-underline{ background:var(--success); border-radius:var(--radius-pill); }
.qcard-blank-input.wrong + .blank-underline{ background:var(--danger); border-radius:var(--radius-pill); }
.qcard-blank-input.correct{ color:var(--success-strong); }
.qcard-blank-input.wrong{ color:var(--danger-strong); }

.qcard-body{ margin-top:22px; flex:1; }
.qcard-hint{ margin-top:auto; padding-top:18px; text-align:center; font-size:12px; color:var(--ink-faint); }

.reveal-divider{ margin:20px 0 16px; border:none; border-top:1.5px dashed var(--paper-line); }
.reveal-answer{ font-size:15.5px; line-height:1.85; color:var(--ink); white-space:pre-wrap; }
.reveal-answer b{ color:var(--success-strong); }
.reveal-label{ font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:8px; }

/* 选择题 / 判断题 选项 */
.opt-list{ display:flex; flex-direction:column; gap:10px; margin-top:4px; }
.opt-btn{
  display:flex; align-items:center; gap:12px; text-align:left;
  padding:13px 16px; border-radius:var(--radius-md);
  border:1.5px solid var(--paper-line); background:rgba(255,255,255,.35);
  color:var(--ink); font-size:15px; cursor:pointer;
  transition:all var(--dur-fast) var(--ease);
}
.opt-btn:hover{ border-color:var(--ink-faint); background:rgba(255,255,255,.6); }
.opt-btn .opt-key{
  width:24px;height:24px; border-radius:50%; background:var(--paper-alt); color:var(--ink-soft);
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0;
}
.opt-btn .opt-text{ display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; line-height:1.5; }
.opt-btn.selected{ border-color:var(--accent); background:var(--accent-glow); }
.opt-btn.selected .opt-key{ background:var(--accent); color:var(--accent-ink); }
.opt-btn.correct{ border-color:var(--success); background:var(--success-bg); }
.opt-btn.correct .opt-key{ background:var(--success); color:#fff; }
.opt-btn.wrong{ border-color:var(--danger); background:var(--danger-bg); }
.opt-btn.wrong .opt-key{ background:var(--danger); color:#fff; }
.opt-btn:disabled{ cursor:default; }
.opt-btn:disabled:hover{ transform:none; }

.tf-row{ display:flex; gap:12px; margin-top:6px; }
.blank-choice-row{ display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
.blank-choice-label{ font-size:12.5px; font-weight:700; color:var(--ink-soft); flex-shrink:0; min-width:40px; }
.blank-choice-opts{ display:flex; flex-wrap:wrap; gap:8px; }
.mini-opt-btn{
  padding:8px 14px; border-radius:var(--radius-pill); border:1.5px solid var(--paper-line);
  background:rgba(255,255,255,.35); color:var(--ink); font-size:13px; cursor:pointer;
  transition:all var(--dur-fast) var(--ease);
}
.mini-opt-btn:hover{ border-color:var(--ink-faint); background:rgba(255,255,255,.6); }
.mini-opt-btn.selected{ border-color:var(--accent); background:var(--accent-glow); font-weight:700; }
.mini-opt-btn.correct{ border-color:var(--success); background:var(--success-bg); color:var(--success-strong); font-weight:700; }
.mini-opt-btn.wrong{ border-color:var(--danger); background:var(--danger-bg); color:var(--danger-strong); }
.mini-opt-btn:disabled{ cursor:default; }
.tf-btn{ flex:1; padding:22px 10px; border-radius:var(--radius-md); border:1.5px solid var(--paper-line); background:rgba(255,255,255,.35); font-size:17px; font-weight:600; color:var(--ink); cursor:pointer; transition:all var(--dur-fast) var(--ease); text-align:center; }
.tf-btn .kbd{ opacity:.4; margin-left:6px; }
.tf-btn:hover{ background:rgba(255,255,255,.6); }
.tf-btn.selected{ border-color:var(--accent); background:var(--accent-glow); }
.tf-btn.correct{ border-color:var(--success); background:var(--success-bg); color:var(--success-strong); }
.tf-btn.wrong{ border-color:var(--danger); background:var(--danger-bg); color:var(--danger-strong); }

.essay-input{
  width:100%; min-height:130px; resize:vertical;
  border:1.5px solid var(--paper-line); border-radius:var(--radius-md);
  background:rgba(255,255,255,.45); color:var(--ink);
  padding:14px 16px; font-size:14.5px; line-height:1.7; outline:none;
  font-family:inherit;
}
.essay-input:focus{ border-color:var(--accent); background:rgba(255,255,255,.7); }
.essay-input::placeholder{ color:var(--ink-faint); }
.your-answer-box{ background:rgba(255,255,255,.5); border:1px solid var(--paper-line); border-radius:var(--radius-md); padding:14px 16px; font-size:14px; line-height:1.75; color:var(--ink-soft); white-space:pre-wrap; }

/* 卡片底部操作区 */
.qcard-actions{ margin-top:24px; display:flex; gap:12px; justify-content:flex-end; }
.qcard-actions.center{ justify-content:center; }

.rate-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:22px; }
.rate-btn{
  display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:13px 6px; border-radius:var(--radius-md); border:none; cursor:pointer;
  font-size:13px; font-weight:700; color:#fff;
  transition:transform var(--dur-fast) var(--ease), filter var(--dur-fast) var(--ease);
}
.rate-btn:hover{ filter:brightness(1.08); transform:translateY(-2px); }
.rate-btn .kbd{ background:rgba(255,255,255,.25); opacity:1; }
.rate-btn .interval{ font-size:10.5px; font-weight:500; opacity:.85; font-family:var(--font-num); font-style:italic; }
.rate-again{ background:var(--danger); }
.rate-hard{ background:var(--gold); color:var(--gold-ink); }
.rate-hard .kbd{ background:rgba(0,0,0,.15); }
.rate-good{ background:var(--info); }
.rate-easy{ background:var(--success); }
.rate-easy .kbd{ background:rgba(0,0,0,.15); }

.flip-hint{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:26px; color:var(--ink-faint); font-size:12.5px; }
.flip-hint .kbd{ background:rgba(0,0,0,.08); color:var(--ink-soft); opacity:1; padding:3px 8px; min-width:auto; font-size:11px; }

/* 反馈浮层 */
.feedback-flash{
  position:fixed; top:22%; left:50%; transform:translate(-50%,-10px) scale(.8);
  padding:10px 22px; border-radius:var(--radius-pill); font-weight:700; font-size:15px;
  display:flex; align-items:center; gap:8px; z-index:100; opacity:0; pointer-events:none;
  box-shadow:0 12px 30px -8px rgba(0,0,0,.4);
}
.feedback-flash.show{ animation:flashPop .8s var(--ease); }
.feedback-flash.good{ background:var(--success); color:#fff; }
.feedback-flash.bad{ background:var(--danger); color:#fff; }
@keyframes flashPop{
  0%{ opacity:0; transform:translate(-50%,-4px) scale(.75); }
  18%{ opacity:1; transform:translate(-50%,0) scale(1.04); }
  30%{ transform:translate(-50%,0) scale(1); }
  78%{ opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-6px) scale(.96); }
}

/* ============================================================
   9. 主观题自评 (打分阶段)
   ============================================================ */
.grade-progress{ text-align:center; font-size:12.5px; color:var(--text-faint); margin-bottom:8px; }
.self-grade-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px; }
.sg-btn{
  border:none; border-radius:var(--radius-md); padding:14px 8px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff; font-weight:700;
  transition:transform var(--dur-fast) var(--ease), filter var(--dur-fast) var(--ease);
}
.sg-btn:hover{ transform:translateY(-2px); filter:brightness(1.08); }
.sg-btn .pct{ font-size:11px; font-weight:600; opacity:.9; font-family:var(--font-num); font-style:italic; }
.sg-0{ background:var(--danger); }
.sg-50{ background:var(--gold); color:var(--gold-ink); }
.sg-80{ background:var(--info); }
.sg-100{ background:var(--success); }

/* ============================================================
   10. 结果报告
   ============================================================ */
.report-hero{ text-align:center; padding:36px 20px 14px; }
.report-hero .score-big{ font-family:var(--font-num); font-style:italic; font-size:76px; line-height:1; color:var(--accent); font-weight:600; }
.report-hero .score-big small{ font-size:28px; opacity:.6; font-style:normal; }
.report-hero .score-label{ margin-top:6px; font-size:14px; color:var(--text-soft); }
.report-stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:26px 0; }
@media (max-width:640px){ .report-stat-grid{ grid-template-columns:repeat(2,1fr); } }
.stat-card{ background:var(--bg-elevated); border:1px solid var(--border-soft); border-radius:var(--radius-md); padding:16px 14px; text-align:center; }
.stat-card .v{ font-family:var(--font-num); font-style:italic; font-size:24px; color:var(--text); }
.stat-card .l{ font-size:11.5px; color:var(--text-faint); margin-top:4px; }

.type-breakdown{ display:flex; flex-direction:column; gap:10px; margin:20px 0 26px; }
.tb-row{ display:flex; align-items:center; gap:12px; }
.tb-row .tb-label{ width:96px; font-size:12.5px; color:var(--text-soft); flex-shrink:0; }
.tb-row .tb-bar-track{ flex:1; height:10px; border-radius:var(--radius-pill); background:var(--bg-soft); overflow:hidden; }
.tb-row .tb-bar-fill{ height:100%; border-radius:var(--radius-pill); background:linear-gradient(90deg,var(--success-strong),var(--success)); transition:width var(--dur-slow) var(--ease); }
.tb-row .tb-pct{ width:74px; text-align:right; font-size:12px; color:var(--text-faint); font-family:var(--font-num); font-style:italic; flex-shrink:0; }

.qa-list{ display:flex; flex-direction:column; gap:9px; margin-top:8px; }
.qa-item{ border:1px solid var(--border-soft); border-radius:var(--radius-md); background:var(--bg-elevated); overflow:hidden; }
.qa-head{ display:flex; align-items:center; gap:11px; padding:13px 16px; cursor:pointer; user-select:none; }
.qa-status{ width:20px;height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; flex-shrink:0; }
.qa-status.ok{ background:var(--success); }
.qa-status.no{ background:var(--danger); }
.qa-status.mid{ background:var(--info); }
.qa-head .qa-q{ flex:1; font-size:13.5px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.qa-head .qa-score{ font-size:12px; color:var(--text-faint); font-family:var(--font-num); font-style:italic; flex-shrink:0; }
.qa-head .chev{ font-size:10px; color:var(--text-faint); transition:transform var(--dur) var(--ease); flex-shrink:0; }
.qa-item.open .chev{ transform:rotate(90deg); }
.qa-detail{ max-height:0; overflow:hidden; transition:max-height var(--dur-slow) var(--ease); }
.qa-item.open .qa-detail{ max-height:400px; }
.qa-detail-inner{ padding:0 16px 16px; font-size:13px; line-height:1.7; }
.qa-detail-inner .row{ margin-top:8px; }
.qa-detail-inner .k{ color:var(--text-faint); font-size:11px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
.qa-detail-inner .v{ color:var(--text-soft); white-space:pre-wrap; }
.qa-detail-inner .v.ok{ color:var(--success-strong); }
.qa-detail-inner .v.no{ color:var(--danger-strong); }

.report-actions{ display:flex; gap:12px; margin-top:30px; flex-wrap:wrap; }
.report-actions .btn{ flex:1; min-width:140px; }

/* ============================================================
   11. 统计仪表盘
   ============================================================ */
.stats-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:26px; }
@media (max-width:640px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
.big-stat{ background:var(--bg-elevated); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:18px 16px; }
.big-stat .icon{ font-size:18px; margin-bottom:8px; display:block; }
.big-stat .v{ font-family:var(--font-num); font-style:italic; font-size:26px; color:var(--text); }
.big-stat .l{ font-size:11.5px; color:var(--text-faint); margin-top:3px; }

.chart-panel{ margin-bottom:22px; }
.chart-panel h4{ font-size:14px; color:var(--text); margin-bottom:14px; font-weight:600; font-family:inherit; }
.chart-empty{ font-size:13px; color:var(--text-faint); text-align:center; padding:30px 0; }

.history-table{ width:100%; border-collapse:collapse; font-size:13px; }
.history-table th{ text-align:left; color:var(--text-faint); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--border-soft); }
.history-table td{ padding:11px 10px; border-bottom:1px solid var(--border-soft); color:var(--text-soft); }
.history-table tr:last-child td{ border-bottom:none; }
.history-table .mode-tag-sm{ font-size:10.5px; padding:2px 8px; border-radius:var(--radius-pill); background:var(--bg-soft); color:var(--text-faint); font-weight:600; }
.history-table .score-cell{ color:var(--text); font-weight:600; font-family:var(--font-num); font-style:italic; }

.settings-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }

/* ============================================================
   12. Toast / Modal
   ============================================================ */
#toast-root{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background:var(--bg-elevated); border:1px solid var(--border); color:var(--text);
  padding:11px 18px; border-radius:var(--radius-pill); font-size:13px; box-shadow:var(--shadow-pop);
  display:flex; align-items:center; gap:8px;
  animation:toastIn .3s var(--ease);
}
@keyframes toastIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
.toast.leaving{ animation:toastOut .25s var(--ease) forwards; }
@keyframes toastOut{ to{ opacity:0; transform:translateY(6px); } }

.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center; z-index:150; padding:20px;
  animation:overlayIn .2s var(--ease);
}
@keyframes overlayIn{ from{opacity:0} to{opacity:1} }
.modal-box{
  background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:26px; max-width:420px; width:100%; box-shadow:var(--shadow-card);
  animation:modalIn .25s var(--ease-spring);
}
@keyframes modalIn{ from{ opacity:0; transform:scale(.92) translateY(8px); } to{ opacity:1; transform:none; } }
.modal-box h3{ font-size:17px; margin-bottom:10px; }
.modal-box p{ font-size:13.5px; color:var(--text-soft); line-height:1.7; margin:0 0 20px; }
.modal-actions{ display:flex; gap:10px; justify-content:flex-end; }

/* ============================================================
   13. 空状态 / 通用
   ============================================================ */
.empty-state{ text-align:center; padding:50px 20px; color:var(--text-faint); }
.empty-state .e-icon{ font-size:34px; margin-bottom:12px; display:block; opacity:.5; }
.empty-state p{ font-size:13.5px; }
.fade-in{ animation:fadeIn var(--dur) var(--ease); }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
.view-pad{ padding:28px 0 60px; }

/* ============================================================
   13b. 浏览整卷（原始顺序参考视图）
   ============================================================ */
.browse-topbar{
  display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  position:sticky; top:0; z-index:25; background:var(--bg); padding:14px 0; margin-bottom:10px;
  border-bottom:1px solid var(--border-soft);
}
.browse-shell{ display:flex; gap:24px; align-items:flex-start; }
.browse-main{ flex:1; min-width:0; }
.browse-sidebar{
  width:230px; flex-shrink:0; position:sticky; top:78px; max-height:calc(100vh - 100px); overflow-y:auto;
  background:var(--bg-elevated); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:16px;
}
.browse-sidebar h5{ font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; margin:16px 0 9px; font-weight:700; }
.browse-sidebar h5:first-child{ margin-top:0; }
.nav-grid{ display:flex; flex-wrap:wrap; gap:5px; }
.nav-cell{
  width:26px;height:26px; border-radius:7px; background:var(--bg-soft); border:1px solid var(--border-soft);
  font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; color:var(--text-soft);
  cursor:pointer; text-decoration:none; transition:all .15s ease; font-family:var(--font-num);
}
.nav-cell:hover{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); transform:scale(1.15); }
.nav-cell.active{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
.browse-section{ margin-bottom:32px; }
.browse-section h3{ font-size:15.5px; color:var(--text); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border-soft); font-family:inherit; font-weight:700; }
.browse-q{ margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--border-soft); scroll-margin-top:90px; }
.browse-q:last-child{ border-bottom:none; }
.browse-q-num{ font-family:var(--font-num); font-style:italic; color:var(--accent); font-weight:600; margin-right:6px; }
.browse-q-text{ font-size:15px; color:var(--text); line-height:1.7; }
.browse-q-opts{ margin-top:8px; padding-left:22px; font-size:13.5px; color:var(--text-soft); line-height:1.85; }
.browse-q-opts .opt-row.is-correct{ color:var(--success-strong); font-weight:600; }
.browse-answer{ margin-top:8px; padding:10px 14px; background:var(--success-bg); border-radius:var(--radius-sm); color:var(--success-strong); font-size:13px; line-height:1.7; white-space:pre-wrap; }
.browse-blank-line{ display:inline-block; width:70px; border-bottom:2px solid var(--text-faint); height:1em; vertical-align:-4px; margin:0 3px; }
@media (max-width:900px){
  .browse-shell{ flex-direction:column; }
  .browse-sidebar{ width:100%; position:static; max-height:none; order:-1; }
  .nav-grid{ max-height:140px; overflow-y:auto; }
}

/* ============================================================
   14. 响应式
   ============================================================ */
@media (max-width:640px){
  .topnav{ padding:10px 12px; gap:8px; }
  .brand{ font-size:14px; gap:0; }
  .brand .brand-text{ display:none; }
  .streak-pill{ padding:5px 10px 5px 8px; font-size:12px; }

const TYPE_ORDER = ['fillInTheBlank','singleChoice','trueFalse','shortAnswer','essay'];

/* ============================================================
   §1. 工具函数

const Utils = {
  escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  },
  shuffle(arr){
    const a = arr.slice();
    for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  },
  clamp(n,min,max){ return Math.max(min,Math.min(max,n)); },
  pad2(n){ return String(n).padStart(2,'0'); },
  hashStr(s){
    let h=5381;
    for (let i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h|=0; }
    return (h>>>0).toString(36);
  },
  uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); },
  letterToIndex(letter){
    if (letter==null) return -1;
    const c = String(letter).trim().toUpperCase().charCodeAt(0);
    return (c>=65 && c<=90) ? c-65 : -1;
  },
  normalizeAnswerText(s){
    return String(s ?? '').trim().replace(/\u3000/g,' ').replace(/\s+/g,'').toLowerCase();
  },
  todayStr(ts){
    const d = new Date(ts ?? Date.now());
    return `${d.getFullYear()}-${this.pad2(d.getMonth()+1)}-${this.pad2(d.getDate())}`;
  },
  fmtClock(ms){
    if (ms==null || isNaN(ms) || ms<0) ms=0;
    const totalSec = Math.round(ms/1000);
    const h = Math.floor(totalSec/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
    if (h>0) return `${h}时${this.pad2(m)}分`;
    return `${m}:${this.pad2(s)}`;
  },
  fmtDateTime(ts){
    const d = new Date(ts);
    return `${d.getMonth()+1}月${d.getDate()}日 ${this.pad2(d.getHours())}:${this.pad2(d.getMinutes())}`;
  },
  fmtDateShort(ts){
    const d = new Date(ts);
    return `${this.pad2(d.getMonth()+1)}-${this.pad2(d.getDate())}`;
  },
  downloadJSON(filename, obj){
    const blob = new Blob([JSON.stringify(obj,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 400);
  },
  readFileAsText(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error('文件读取失败'));
      reader.readAsText(file, 'utf-8');
    });
  }
};

/* ============================================================
   §2. 存储抽象层
   优先使用 window.storage（在 Claude 内预览时可用的云端存储）；
   若不存在（下载到本地、脱离 Claude 环境直接打开），
   则改用浏览器 localStorage；两者都失败时退化为内存存储
   （仅保证当前这次打开不报错，但刷新后会丢失）。
   ============================================================ */
const Store = {
  memory:{},
  backendName:null,
  hasCloud(){
    return typeof window.storage !== 'undefined' && window.storage &&
      typeof window.storage.get === 'function' && typeof window.storage.set === 'function';
  },
  backend(){
    if (this.backendName) return this.backendName;
    this.backendName = this.hasCloud() ? 'cloud' : 'local';
    return this.backendName;
  },
  async get(key, fallback=null){
    if (this.hasCloud()){
      try{ const r = await window.storage.get(key, false); return r ? r.value : fallback; }
      catch(e){ return (key in this.memory) ? this.memory[key] : fallback; }
    }
    try{
      const v = localStorage.getItem(key);
      return v!==null ? v : fallback;
    }catch(e){ return (key in this.memory) ? this.memory[key] : fallback; }
  },
  async set(key, value){
    this.memory[key] = value;
    if (this.hasCloud()){
      try{ const r = await window.storage.set(key, value, false); return !!r; }
      catch(e){ return false; }
    }
    try{ localStorage.setItem(key, value); return true; }
    catch(e){ return false; }
  },
  async getJSON(key, fallback){
    const raw = await this.get(key, null);
    if (raw==null) return fallback;
    try{ return JSON.parse(raw); }catch(e){ return fallback; }
  },
  async setJSON(key, obj){ return this.set(key, JSON.stringify(obj)); },
  async remove(key){
    delete this.memory[key];
    if (this.hasCloud()){ try{ await window.storage.delete(key,false); }catch(e){} return; }
    try{ localStorage.removeItem(key); }catch(e){}
  }
};

/* ============================================================
   §4. 数据解析：三层兜底策略
   1) 标准 JSON  2) UMD/CommonJS 模块 (module.exports)  3) 裸对象/数组表达式
   ============================================================ */
function parseDeckFile(text, filename){
  const trimmed = String(text||'').trim();
  const errors = [];

  if (trimmed.startsWith('{') || trimmed.startsWith('[')){
    try{ return normalizeDeck(JSON.parse(trimmed), filename); }
    catch(e){ errors.push('按 JSON 解析失败：'+e.message); }
  }
  try{
    const mod = { exports:{} };
    const fn = new Function('module','exports','global','globalThis','self','window', trimmed);
    fn(mod, mod.exports, window, window, window, window);
    if (mod.exports && typeof mod.exports==='object' && Object.keys(mod.exports).length){
      return normalizeDeck(mod.exports, filename);
    }
    errors.push('按模块执行成功，但未检测到 module.exports 导出内容');
  }catch(e){ errors.push('按 UMD/CommonJS 模块执行失败：'+e.message); }
  try{
    const fn2 = new Function('return ('+trimmed+')');
    const val = fn2();
    if (val && typeof val==='object') return normalizeDeck(val, filename);
    errors.push('裸表达式求值结果不是对象');
  }catch(e){ errors.push('按裸对象表达式解析失败：'+e.message); }

  throw new Error('无法识别该文件的数据格式，已尝试 JSON / UMD模块 / 裸对象三种方式均失败。\n\n'+errors.join('\n')+'\n\n请确认文件包含 fillInTheBlank / singleChoice / trueFalse / shortAnswer / essay 等字段。');
}

function normalizeDeck(raw, sourceName){
  const src = raw && raw.data && typeof raw.data==='object' ? raw.data : raw;
  if (!src || typeof src!=='object') throw new Error('数据格式无法识别：既不是题库对象，也不是标准模块导出。');

  const hasAny = TYPE_ORDER.some(t => Array.isArray(src[t]) && src[t].length);
  if (!hasAny) throw new Error('未在文件中找到任何题目数组，期望字段名为：fillInTheBlank / singleChoice / trueFalse / shortAnswer / essay 之一。');

  const questions = [];
  const byType = {};
  const skipped = [];

  TYPE_ORDER.forEach(type=>{
    const arr = Array.isArray(src[type]) ? src[type] : [];
    byType[type] = [];
    arr.forEach((q,idx)=>{
      const uid = type+'-'+(q.id!=null ? q.id : idx);
      const base = { uid, type, question:String(q.question||'').trim(), objective:QuestionTypes[type].objective };
      if (!base.question){ skipped.push(uid+':题目为空'); return; }

      if (type==='singleChoice'){
        if (!Array.isArray(q.options) || !q.options.length){ skipped.push(uid+':缺少选项'); return; }
        const correctIdx = typeof q.answer==='number' ? q.answer : Utils.letterToIndex(q.answer);
        base.options = q.options.map((text,i)=>({ text:String(text), correct:i===correctIdx }));
        if (!base.options.some(o=>o.correct)){ skipped.push(uid+':未找到匹配的正确选项(answer='+q.answer+')'); return; }
      } else if (type==='trueFalse'){
        if (typeof q.answer!=='boolean'){ skipped.push(uid+':answer 不是布尔值'); return; }
        base.answer = q.answer;
      } else if (type==='fillInTheBlank'){
        if (!Array.isArray(q.answers) || !q.answers.length){ skipped.push(uid+':缺少 answers 数组'); return; }
        base.answers = q.answers.map(String);
        base.blankCount = (base.question.match(/_{2,}/g)||[]).length || 1;
      } else {
        base.reference = String(q.answer||'').trim();
        if (!base.reference){ skipped.push(uid+':缺少参考答案'); return; }
      }
      questions.push(base);
      byType[type].push(base);
    });
  });

  if (!questions.length) throw new Error('题库解析后没有任何有效题目。跳过详情：\n'+skipped.join('\n'));

  const metaSrc = (src.meta && typeof src.meta==='object') ? src.meta : {};
  const meta = Object.assign({ title:sourceName||'未命名题库', subject:'', description:'', version:'' }, metaSrc);
  if (!metaSrc.title) meta.title = (sourceName||'未命名题库').replace(/\.(js|json)$/i,'');
  const deckId = Utils.hashStr((meta.title||'untitled')+'::'+questions.length);
  return { id:deckId, meta, questions, byType, totalQuestions:questions.length, skipped, loadedAt:Date.now() };
}

/* ============================================================
   §6. 间隔重复(SRS) & 连续学习天数(Streak) 逻辑
   ============================================================ */
function applySrsRating(cardState, rating, now){
  now = now || Date.now();
  let { level=0, reviewCount=0 } = cardState || {};
  let requeue = false;
  if (rating==='again'){ level=0; requeue=true; }
  else if (rating==='hard'){ level=Math.max(0,level); }
  else if (rating==='good'){ level=Math.min(SRS_INTERVAL_DAYS.length-1, level+1); }
  else if (rating==='easy'){ level=Math.min(SRS_INTERVAL_DAYS.length-1, level+2); }
  const days = SRS_INTERVAL_DAYS[level];
  const dueAt = requeue ? now : now + days*86400000;
  return { level, dueAt, reviewCount:reviewCount+1, lastRating:rating, requeue, intervalDays:days };
}
function dueCount(deck, srs, now){
  now = now || Date.now();
  return deck.questions.filter(q => !srs[q.uid] || srs[q.uid].dueAt<=now).length;
}
function updateStreak(streakState, nowTs){
  nowTs = nowTs || Date.now();
  const today = Utils.todayStr(nowTs);
  let { current=0, longest=0, lastDate=null } = streakState || {};
  let bumped = false;
  if (lastDate===today){ /* 今天已经记过，不重复加 */ }
  else{
    const yesterday = Utils.todayStr(nowTs-86400000);
    current = (lastDate===yesterday) ? current+1 : 1;
    lastDate = today; bumped = true;
  }
  longest = Math.max(longest, current);
  return { state:{current,longest,lastDate}, bumped };
}

/* ============================================================
   §7. Toast / Modal 轻提示与弹窗
   ============================================================ */
function toast(msg, opts={}){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = (opts.icon ? `<span>${opts.icon}</span>` : '') + `<span>${Utils.escapeHtml(msg)}</span>`;
  root.appendChild(el);
  setTimeout(()=>{ el.classList.add('leaving'); setTimeout(()=>el.remove(), 260); }, opts.duration || 2600);
}
function showModal({title, bodyHtml, actions}){
  const root = document.getElementById('modal-root');
  const actionsHtml = actions.map((a,i)=>`<button class="btn ${a.cls||'btn-secondary'}" data-modal-action="${i}">${Utils.escapeHtml(a.label)}</button>`).join('');
  root.innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal-box" role="dialog" aria-modal="true"><h3>${Utils.escapeHtml(title)}</h3><p>${bodyHtml}</p><div class="modal-actions">${actionsHtml}</div></div></div>`;
  const overlay = document.getElementById('modal-overlay');
  overlay.addEventListener('click', e=>{ if (e.target===overlay) closeModal(); });
  root.querySelectorAll('[data-modal-action]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = +btn.dataset.modalAction;
      closeModal();
      if (actions[idx].onClick) actions[idx].onClick();
    });
  });
}
function closeModal(){ const r=document.getElementById('modal-root'); if(r) r.innerHTML=''; }
function confirmModal(title, bodyHtml, onConfirm, opts={}){
  showModal({ title, bodyHtml, actions:[
    { label:opts.cancelLabel||'取消', cls:'btn-secondary' },
    { label:opts.confirmLabel||'确定', cls:opts.danger?'btn-danger':'btn-primary', onClick:onConfirm }
  ]});
}

async function handleFile(file){
  const name = file.name || '未命名文件';
  if (!/\.(js|json)$/i.test(name)){
    showLoadError(`不支持的文件类型："${name}"。请上传 .js 或 .json 文件。`);
    return;
  }
  try{
    const text = await Utils.readFileAsText(file);
    const deck = parseDeckFile(text, name);
    await finishDeckLoad(deck);
  }catch(e){ showLoadError(e.message); }
}
async function loadDeckFromRaw(raw, name){
  try{ await finishDeckLoad(normalizeDeck(raw, name)); }
  catch(e){ showLoadError(e.message); }
}
function showLoadError(msg){
  const slot = document.getElementById('load-error-slot');
  if (slot) slot.innerHTML = `<div class="load-error fade-in">⚠️ ${Utils.escapeHtml(msg)}</div>`;
}
function tfPolarityCounts(deck){
  const tf = (deck.byType && deck.byType.trueFalse) || [];
  const trueCount = tf.filter(q=>q.answer===true).length;
  const falseCount = tf.filter(q=>q.answer===false).length;
  return { total:tf.length, trueCount, falseCount };
}
async function finishDeckLoad(deck){
  App.deck = deck;
  App.srs = await loadSrs(deck.id);
  await registerDeck(deck);
  await Store.setJSON(STORAGE_KEYS.lastDeck, deck);
  TYPE_ORDER.forEach(t=>{
    if (deck.byType[t] && deck.byType[t].length && !(t in App.settings.includeTypes)) App.settings.includeTypes[t]=true;
  });
  const pol = tfPolarityCounts(deck);
  App.settings.tfFilter = (pol.trueCount>0 && pol.falseCount>0) ? (pol.trueCount<=pol.falseCount?'true':'false') : 'all';
  App.session = null;
  App.view = 'setup';
  toast(`已加载「${deck.meta.title}」，共 ${deck.totalQuestions} 题`, {icon:'📚'});

function computeSelectedQuestions(deck, s){
  let qs = deck.questions.filter(q => s.includeTypes[q.type]);
  if (s.mode!=='test' && s.tfFilter && s.tfFilter!=='all'){
    const want = s.tfFilter==='true';
    qs = qs.filter(q => q.type!=='trueFalse' || q.answer===want);
  }
  if (s.mode==='flashcard' && s.flashcardScope==='due'){
    const now = Date.now();
    qs = qs.filter(q => !App.srs[q.uid] || App.srs[q.uid].dueAt<=now);
  }
  return qs;
}
const MODE_INFO = {
  flashcard:{ icon:'🗂️', title:'闪卡模式', desc:'单题聚焦卡片流，空格翻面、1-4 评分，配合间隔重复安排复习节奏。', tag:'Anki 式回顾' },
  learn:{ icon:'🎯', title:'学习模式', desc:'主动作答 + 即时反馈，答错会重新排队，直到你掌握为止。', tag:'逐步攻克' },
  test:{ icon:'📝', title:'测试模式', desc:'模拟真实考试，一次性作答完毕后统一判分，给出完整报告。', tag:'真实评估' }
};

function getEffectiveByType(deck, s){
  if (s.mode==='test' || !s.tfFilter || s.tfFilter==='all') return deck.byType;
  const want = s.tfFilter==='true';
  const out = Object.assign({}, deck.byType);
  out.trueFalse = (deck.byType.trueFalse||[]).filter(q=>q.answer===want);
  return out;
}
function planMockExam(deck, s, targetScore){
  const byType = getEffectiveByType(deck, s);
  const types = TYPE_ORDER.filter(t=>s.includeTypes[t] && byType[t] && byType[t].length);
  if (!types.length) return null;
  const avail = {}; types.forEach(t=>avail[t]=byType[t].length);
  const totalAvail = types.reduce((sum,t)=>sum+avail[t],0);
  if (!totalAvail) return null;
  const counts = {};
  types.forEach(t=>{ counts[t] = Math.min(1, avail[t]); }); // 每种已选题型先保底1题
  let used = types.reduce((sum,t)=>sum+counts[t]*(Number(s.points[t])||1),0);
  let remaining = targetScore-used;
  if (remaining>0){
    types.forEach((t,i)=>{
      const isLast = i===types.length-1;
      const pv = Number(s.points[t])||1;
      const share = isLast ? remaining : remaining*(avail[t]/totalAvail);
      const add = Utils.clamp(Math.round(share/pv), 0, avail[t]-counts[t]);
      counts[t]+=add;
    });
  }
  let currentTotal = types.reduce((sum,t)=>sum+counts[t]*(Number(s.points[t])||1),0);
  let diff = Math.round((targetScore-currentTotal)*100)/100;
  const bySmallPoint = types.slice().sort((a,b)=>(Number(s.points[a])||1)-(Number(s.points[b])||1));
  let guard=0;
  while (Math.abs(diff)>=0.01 && guard<300){
    guard++;
    let adjusted=false;
    for (const t of bySmallPoint){
      const pv = Number(s.points[t])||1;
      if (diff>0 && counts[t]<avail[t] && pv<=diff+0.001){ counts[t]++; diff=Math.round((diff-pv)*100)/100; adjusted=true; break; }
      if (diff<0 && counts[t]>0 && pv<=(-diff)+0.001){ counts[t]--; diff=Math.round((diff+pv)*100)/100; adjusted=true; break; }
    }
    if (!adjusted) break;
  }
  const achievedTotal = Math.round((targetScore-diff)*100)/100;
  const totalCount = types.reduce((sum,t)=>sum+counts[t],0);
  return { counts, achievedTotal, totalCount };
}

/* ============================================================
   §11. 答题引擎：判分函数
   ============================================================ */
function gradeFillInBlank(userInput, acceptedAnswers){
  const userNorm = Utils.normalizeAnswerText(userInput);
  if (!userNorm) return false;
  return acceptedAnswers.some(ans => String(ans).split('/').map(Utils.normalizeAnswerText).includes(userNorm));
}
function gradeObjective(card, userInput){
  const points = Number(App.settings.points[card.type])||0;
  if (card._perBlankChoice){
    const sel = Array.isArray(userInput) ? userInput : [];
    const isCorrect = card._blankOptions.every((opts,i)=> opts[sel[i]] && opts[sel[i]].correct);
    const userTexts = card._blankOptions.map((opts,i)=> (sel[i]!=null && opts[sel[i]]) ? opts[sel[i]].text : '(未选)');
    const correctTexts = card._blankOptions.map(opts=>{ const c=opts.find(o=>o.correct); return c?c.text:''; });
    return { isCorrect, scoreEarned:isCorrect?points:0, maxScore:points,
      userAnswerDisplay: userTexts.join(' / '), correctAnswerDisplay: correctTexts.join(' / ') };
  }
  if (card._multiSelect){
    const selected = Array.isArray(userInput) ? userInput : [];
    const correctIdxs = card.options.map((o,i)=>o.correct?i:-1).filter(i=>i>=0);
    const selectedSet = new Set(selected), correctSet = new Set(correctIdxs);
    const isCorrect = selectedSet.size===correctSet.size && [...selectedSet].every(i=>correctSet.has(i));
    const selectedTexts = selected.map(i=>card.options[i] && card.options[i].text).filter(Boolean);
    const correctTexts = correctIdxs.map(i=>card.options[i].text);
    return { isCorrect, scoreEarned:isCorrect?points:0, maxScore:points,
      userAnswerDisplay: selectedTexts.length ? selectedTexts.join('、') : '(未作答)', correctAnswerDisplay: correctTexts.join('、') };
  }
  if (card.type==='singleChoice' || card._dynamicChoice){
    const opt = card.options[userInput];
    const isCorrect = !!(opt && opt.correct);
    const correctOpt = card.options.find(o=>o.correct);
    return { isCorrect, scoreEarned:isCorrect?points:0, maxScore:points,
      userAnswerDisplay: opt ? opt.text : '(未作答)', correctAnswerDisplay: correctOpt ? correctOpt.text : '' };
  }
  if (card.type==='trueFalse'){
    const isCorrect = userInput===card.answer;
    return { isCorrect, scoreEarned:isCorrect?points:0, maxScore:points,
      userAnswerDisplay: userInput==null?'(未作答)':(userInput?'对':'错'), correctAnswerDisplay: card.answer?'对':'错' };
  }
  // fillInTheBlank
  const isCorrect = gradeFillInBlank(userInput, card.answers);
  return { isCorrect, scoreEarned:isCorrect?points:0, maxScore:points,
    userAnswerDisplay: (userInput&&String(userInput).trim()) ? userInput : '(未作答)',
    correctAnswerDisplay: card.answers.join(' / ') };
}
function gradeSubjective(card, userText, ratingKey){
  const points = Number(App.settings.points[card.type])||0;
  const pct = RATING_TO_PCT[ratingKey] ?? 0;
  return { pct, scoreEarned: Math.round(points*pct)/100, maxScore:points,
    userAnswerDisplay:(userText&&userText.trim())?userText:'(未作答)', correctAnswerDisplay:card.reference };
}
function gradeFlashcardRating(card, ratingKey){
  const points = Number(App.settings.points[card.type])||0;
  const pct = RATING_TO_PCT[ratingKey] ?? 0;
  let correctAnswerDisplay;
  if (card.type==='singleChoice') correctAnswerDisplay = card.options.find(o=>o.correct).text;
  else if (card.type==='trueFalse') correctAnswerDisplay = card.answer?'对':'错';
  else if (card.type==='fillInTheBlank') correctAnswerDisplay = card.answers.join(' / ');
  else correctAnswerDisplay = card.reference;
  return { pct, scoreEarned: Math.round(points*pct)/100, maxScore:points,
    userAnswerDisplay:'（自我评分：'+ratingLabel(ratingKey)+'）', correctAnswerDisplay };
}
function ratingLabel(key){ return {again:'完全不会',hard:'有点模糊',good:'基本记得',easy:'完全掌握'}[key] || key; }
function resultStatus(r){
  if (typeof r.pct==='number') return r.pct>=80 ? 'ok' : (r.pct>=50 ? 'mid' : 'no');
  return r.isCorrect ? 'ok' : 'no';
}
function recordResult(card, gradeInfo){
  const sess = App.session;
  const already = sess.results.find(r=>r.uid===card.uid);
  if (already) return already;
  const entry = Object.assign({ uid:card.uid, type:card.type, question:card.question, graded:true }, gradeInfo);
  sess.results.push(entry);
  return entry;
}
function recordPendingSubjective(card, userText){
  App.session.results.push({
    uid:card.uid, type:card.type, question:card.question, reference:card.reference,
    maxScore:Number(App.settings.points[card.type])||0, pendingUserText:userText||'', graded:false
  });
}
function finalizeGradingEntry(entry, ratingKey){
  const pct = RATING_TO_PCT[ratingKey] ?? 0;
  entry.pct = pct;
  entry.ratingKey = ratingKey;
  entry.scoreEarned = Math.round(entry.maxScore*pct)/100;
  entry.userAnswerDisplay = (entry.pendingUserText&&entry.pendingUserText.trim()) ? entry.pendingUserText : '(未作答)';
  entry.correctAnswerDisplay = entry.reference;
  entry.graded = true;
}

/* ============================================================
   §12. 答题引擎：队列构建 & 会话生命周期
   ============================================================ */
function buildDynamicChoiceOptions(card, pool, count){
  const others = pool.filter(p=>p.uid!==card.uid);
  const correctText = String(card.reference||'').trim();
  if (!correctText) return null;
  const candidateTexts = others.map(p=>String(p.reference||'').trim());
  const uniqueDistractors = [...new Set(Utils.shuffle(candidateTexts))].filter(t=>t && t!==correctText).slice(0,count);
  if (uniqueDistractors.length<1) return null;
  const options = [{text:correctText, correct:true}].concat(uniqueDistractors.map(t=>({text:t, correct:false})));
  return Utils.shuffle(options);
}
function buildFillBlankChoiceOptions(card, pool){
  const blankCount = (card.answers||[]).length;
  if (!blankCount) return null;
  const correctTexts = card.answers.map(a=>String(a).split('/')[0].trim());
  if (correctTexts.some(t=>!t)) return null;
  const others = pool.filter(p=>p.uid!==card.uid);
  const candidateTexts = others.map(p=>String(p.answers[0]).split('/')[0].trim());
  const uniqueCorrectSet = new Set(correctTexts);
  const perBlankOptions = [];
  for (const correctText of correctTexts){
    // 干扰项只从"本题以外的其它题目"里取，绝不包含本题任何一个空(包括自己和其它空)的正确答案。
    // 这样每个空的选项彼此完全独立，用户不可能"选到别的空的答案"，
    // 从UI层面直接消除了"并列关系/顺序关系"的判分歧义，不需要猜测两者关系。
    const distractors = [...new Set(Utils.shuffle(candidateTexts))]
      .filter(t=>t && !uniqueCorrectSet.has(t))
      .slice(0,3);
    if (!distractors.length) return null; // 干扰项不足，放弃转换，上层会回退为原生填空输入
    const opts = Utils.shuffle([{text:correctText, correct:true}].concat(distractors.map(t=>({text:t, correct:false}))));
    perBlankOptions.push(opts);
  }
  return { blankCount, perBlankOptions };
}
function applySelectionMode(qs, deck){
  const blankPool = deck.byType.fillInTheBlank || [];
  const shortPool = deck.byType.shortAnswer || [];
  return qs.map(q=>{
    if (q.type==='fillInTheBlank'){
      const res = buildFillBlankChoiceOptions(q, blankPool);
      if (res){
        if (res.blankCount<=1) return Object.assign({}, q, { options:res.perBlankOptions[0], _dynamicChoice:true });
        return Object.assign({}, q, { _perBlankChoice:true, _blankOptions:res.perBlankOptions });
      }
    } else if (q.type==='shortAnswer'){
      const opts = buildDynamicChoiceOptions(q, shortPool, 2);
      if (opts) return Object.assign({}, q, { options:opts, _dynamicChoice:true });
    }
    return q;
  });
}
function buildQueue(deck, s){
  let qs;
  if (s.mockExam){
    const plan = planMockExam(deck, s, 100);
    const byType = getEffectiveByType(deck, s);
    qs = [];
    if (plan){
      TYPE_ORDER.forEach(t=>{
        const n = plan.counts[t]||0;
        if (n>0) qs = qs.concat(Utils.shuffle(byType[t]).slice(0,n));
      });
    }
    qs = Utils.shuffle(qs);
  } else {
    qs = computeSelectedQuestions(deck, s);
    if (s.shuffleQuestions) qs = Utils.shuffle(qs);
    if (s.questionLimit!=='all') qs = qs.slice(0, s.questionLimit);
  }
  if (s.shuffleOptions){
    qs = qs.map(q => q.options ? Object.assign({}, q, { options:Utils.shuffle(q.options) }) : q);
  }
  if (s.selectionMode && s.mode!=='flashcard'){
    qs = applySelectionMode(qs, deck);
  }
  return qs;
}
function startSession(){
  const deck = App.deck, s = App.settings;
  const queue = buildQueue(deck, s);
  if (!queue.length){ toast('没有可学习的题目，请检查题型筛选 / 到期范围设置', {icon:'⚠️'}); return; }
  App.session = {
    mode:s.mode, status:'active', phase:'quiz',
    queue, totalInitial:queue.length,
    revealed:false, selectedOptionIdx:null, selectedOptionIdxs:[], selectedPerBlank:null, selectedTF:null, userTextAnswer:'',
    feedbackFlash:null, lastUserInput:null, lastGradeCorrect:null,
    requeueCounts:{}, results:[], gradingIndex:0, answeredStack:[],
    startedAt:Date.now(), cardStartedAt:Date.now()
  };
  App.view = 'quiz';
  render();
}
function transitionRender(renderFn){
  const existing = document.getElementById('qcard-el');
  if (existing && !document.hidden){
    existing.classList.add('leaving');
    setTimeout(renderFn, 120);
  } else {
    renderFn();
  }
}
function completeCurrentCard(opts){
  opts = opts || {};
  const sess = App.session;
  const card = sess.queue.shift();
  if (opts.requeue){
    const insertAt = Math.min(sess.queue.length, opts.requeueDelay==null?3:opts.requeueDelay);
    sess.queue.splice(insertAt, 0, card);
  } else if (sess.mode==='test'){
    sess.answeredStack = sess.answeredStack || [];
    sess.answeredStack.push(card);
  }
  if (!sess.queue.length){ finishQuizPhase(); return; }
  sess.revealed=false; sess.selectedOptionIdx=null; sess.selectedOptionIdxs=[]; sess.selectedTF=null; sess.userTextAnswer='';
  sess.selectedPerBlank=null;
  sess.feedbackFlash=null; sess.lastUserInput=null; sess.lastGradeCorrect=null;
  sess.cardStartedAt = Date.now();
  transitionRender(render);
}
function goToPreviousQuestion(){
  const sess = App.session;
  if (!sess || !sess.answeredStack || !sess.answeredStack.length) return;
  const prevCard = sess.answeredStack.pop();
  sess.results = sess.results.filter(r=>r.uid!==prevCard.uid);
  sess.queue.unshift(prevCard);
  restoreAnswerForCard(sess, prevCard);
  sess.revealed=false;
  sess.feedbackFlash=null; sess.lastUserInput=null; sess.lastGradeCorrect=null;
  sess.cardStartedAt = Date.now();
  transitionRender(render);
}
function finishQuizPhase(){
  const sess = App.session;
  const hasPending = sess.results.some(r=>r.graded===false);
  if (hasPending){ sess.phase='grading'; sess.gradingIndex=0; App.view='grading'; }
  else { finalizeSession(); App.view='report'; }
  render();
}
function finalizeSession(){
  const sess = App.session;
  const endedAt = Date.now();
  const byType = {};
  TYPE_ORDER.forEach(t=>{ byType[t] = { correct:0, mid:0, total:0, score:0, maxScore:0 }; });
  let score=0, maxScore=0;
  sess.results.forEach(r=>{
    score += r.scoreEarned||0; maxScore += r.maxScore||0;
    const b = byType[r.type];
    b.total++; b.score += r.scoreEarned||0; b.maxScore += r.maxScore||0;
    const status = resultStatus(r);
    if (status==='ok') b.correct++; else if (status==='mid') b.mid++;
  });
  const record = {
    id: Utils.uid('sess'), deckId:App.deck.id, deckTitle:App.deck.meta.title, mode:sess.mode,
    startedAt:sess.startedAt, endedAt, durationMs:endedAt-sess.startedAt,
    totalQuestions:sess.results.length,
    score:Math.round(score*100)/100, maxScore:Math.round(maxScore*100)/100,
    percentage: maxScore>0 ? Math.round((score/maxScore)*1000)/10 : 0,
    byType,
    details: sess.results.map(r=>({
      uid:r.uid, type:r.type, question:r.question,
      userAnswer:r.userAnswerDisplay, correctAnswer:r.correctAnswerDisplay,
      status:resultStatus(r), scoreEarned:r.scoreEarned, maxScore:r.maxScore
    }))
  };
  const { state:newStreak, bumped } = updateStreak(App.progress.streak, endedAt);
  App.progress.streak = newStreak;
  App.progress.sessions.unshift(record);
  if (App.progress.sessions.length>300) App.progress.sessions.length = 300;
  App.progress.totals.totalSessions++;
  App.progress.totals.totalQuestionsAnswered += record.totalQuestions;
  App.progress.totals.totalScorePoints += record.score;
  App.progress.totals.totalMaxPoints += record.maxScore;
  App.progress.totals.totalTimeMs += record.durationMs;
  saveProgress();
  sess.status = 'finished';
  App.lastReport = record;
  App.session = null;
  if (bumped) setTimeout(bumpStreakPill, 350);
}

/* ============================================================
   §13. 视图：答题卡片流

function renderQuizView(container){
  const sess = App.session;
  if (!sess){ App.view='setup'; render(); return; }
  const card = sess.queue[0];
  if (!card){ finishQuizPhase(); return; }
  const doneCount = sess.totalInitial - sess.queue.length;
  const pct = Utils.clamp(Math.round((doneCount/sess.totalInitial)*100), 4, 100);
  const canGoBack = sess.mode==='test' && sess.answeredStack && sess.answeredStack.length>0;

  container.className = 'quiz-shell fade-in';
  container.innerHTML = `
    <div class="quiz-topbar">
      ${canGoBack ? `<button class="btn btn-ghost quiz-prev" id="quiz-prev-btn" type="button">← 上一题</button>` : ''}
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${Math.min(doneCount+1,sess.totalInitial)} / ${sess.totalInitial}</div>
      <button class="btn btn-ghost quiz-exit" id="quiz-exit-btn" type="button">退出</button>
    </div>
    <div class="card-stage">
      <div class="card-stack">${renderCardHtml(sess, card)}</div>
    </div>
  `;
  document.getElementById('quiz-exit-btn').onclick = confirmExitSession;
  const prevBtn = document.getElementById('quiz-prev-btn');
  if (prevBtn) prevBtn.onclick = goToPreviousQuestion;
  bindCardEvents(sess, card);
}
function cardClasses(sess){
  let cls = 'qcard';
  if (sess.mode==='flashcard' && sess.revealed) cls += ' flipping';
  if (sess.feedbackFlash==='good') cls += ' pulse-good';
  if (sess.feedbackFlash==='bad') cls += ' pulse-bad shake';
  return cls;
}
function typeLabelHtml(card, extra){
  return `<div class="qcard-type"><span class="dot"></span>${QuestionTypes[card.type].label}${extra?(' · '+extra):''}</div>`;
}
function renderQuestionText(card){
  let text = Utils.escapeHtml(card.question);
  if (card.type==='fillInTheBlank') text = text.replace(/_{2,}/g, '<span class="blank" aria-hidden="true"></span>');

}
function renderFilledBlankHtml(card){

  const answers = card.answers || [];
  return Utils.escapeHtml(card.question).replace(/_{2,}/g, ()=>{
    const raw = answers[i] != null ? answers[i] : answers[answers.length-1];

function renderRateGrid(card){
  const cur = App.srs[card.uid] || { level:0 };
  const lvl = Math.max(0, cur.level||0);
  const fmt = d => d===0 ? '<1天' : d+'天';
  const pHard = SRS_INTERVAL_DAYS[lvl];
  const pGood = SRS_INTERVAL_DAYS[Math.min(SRS_INTERVAL_DAYS.length-1,lvl+1)];
  const pEasy = SRS_INTERVAL_DAYS[Math.min(SRS_INTERVAL_DAYS.length-1,lvl+2)];
  return `<div class="rate-grid">
    <button type="button" class="rate-btn rate-again" data-rate="again"><span>完全不会</span><span class="kbd">1</span><span class="interval">重来</span></button>
    <button type="button" class="rate-btn rate-hard" data-rate="hard"><span>有点模糊</span><span class="kbd">2</span><span class="interval">${fmt(pHard)}</span></button>

    <button type="button" class="rate-btn rate-easy" data-rate="easy"><span>完全掌握</span><span class="kbd">4</span><span class="interval">${fmt(pEasy)}</span></button>

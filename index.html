function renderQuizView(container){
  const sess = App.session;
  if (!sess){ App.view='setup'; render(); return; }
  const card = sess.queue[0];
  if (!card){ finishQuizPhase(); return; }
  const doneCount = sess.totalInitial - sess.queue.length;
  const pct = Utils.clamp(Math.round((doneCount/sess.totalInitial)*100), 4, 100);
  const canGoBack = sess.mode==='test' && sess.answeredStack && sess.answeredStack.length>0;

  container.className = 'quiz-shell fade-in';
  container.innerHTML = `
    <div class="quiz-topbar">
      ${canGoBack ? `<button class="btn btn-ghost quiz-prev" id="quiz-prev-btn" type="button">← 上一题</button>` : ''}
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${Math.min(doneCount+1,sess.totalInitial)} / ${sess.totalInitial}</div>
      <button class="btn btn-ghost quiz-exit" id="quiz-exit-btn" type="button">退出</button>
    </div>
    <div class="card-stage">
      <div class="card-stack">${renderCardHtml(sess, card)}</div>
    </div>
  `;
  document.getElementById('quiz-exit-btn').onclick = confirmExitSession;
  const prevBtn = document.getElementById('quiz-prev-btn');
  if (prevBtn) prevBtn.onclick = goToPreviousQuestion;
  bindCardEvents(sess, card);
  schedulePendingCompletion(sess);
}
function schedulePendingCompletion(sess){
  if (!sess || !sess.pendingCompletion) return;
  if (sess._pendingTimer) clearTimeout(sess._pendingTimer);
  const pending = sess.pendingCompletion;
  sess._pendingTimer = setTimeout(()=>{
    if (!App.session || App.session!==sess || !sess.pendingCompletion) return;
    const cur = sess.queue[0];
    if (pending.requeue && cur) sess.requeueCounts[cur.uid] = (sess.requeueCounts[cur.uid]||0)+1;
    completeCurrentCard({ requeue:pending.requeue, requeueDelay:pending.requeueDelay });
  }, Math.max(0, (pending.dueAt||Date.now())-Date.now()));
}
function cardClasses(sess){
  let cls = 'qcard';
  if (sess.mode==='flashcard' && sess.revealed) cls += ' flipping';
  if (sess.feedbackFlash==='good') cls += ' pulse-good';
  if (sess.feedbackFlash==='bad') cls += ' pulse-bad shake';
  return cls;
}
function typeLabelHtml(card, extra){

function renderQuestionText(card){

function blankInputChars(value){
  const text = String(value||'');
  const weighted = Array.from(text).reduce((sum,ch)=>sum + (/[\u2E80-\u9FFF\uF900-\uFAFF]/.test(ch) ? 1.15 : .62), 0);
  return Math.max(6, Math.ceil(weighted));
}
function syncBlankInputWidth(input){

  if (wrap) wrap.style.setProperty('--blank-chars', blankInputChars(input.value));

function renderFilledBlankHtml(card){

function renderRateGrid(card){

function renderQuestionTools(card){

function renderFlashcardFace(sess, card){

    ? `<div class="qcard-question">${renderFilledBlankHtml(card)}</div>`

    </div>`;
  } else if ((card.type==='shortAnswer'||card.type==='essay') && revealed){

function renderPerBlankQuestionHtml(card, sel, activeIdx, revealed){
  let i = 0;
  const blanks = card._blankOptions || [];
  const html = Utils.escapeHtml(card.question).replace(/_{2,}/g, ()=>{
    const bi = i++;
    const opts = blanks[bi] || [];
    const picked = sel[bi]!=null ? opts[sel[bi]] : null;
    let cls = 'inline-blank-choice';
    if (bi===activeIdx && !revealed) cls += ' active';
    if (picked) cls += ' filled';
    if (revealed && picked) cls += picked.correct ? ' correct' : ' wrong';
    const content = picked ? Utils.escapeHtml(picked.text) : '<span class="blank-line-only" aria-hidden="true"></span>';
    return `<button type="button" class="${cls}" data-blank-nav="${bi}" ${revealed?'disabled':''} aria-label="填空">${content}</button>`;
  });
  if (i===0){
    return html + blanks.map((opts,bi)=>{
      const picked = sel[bi]!=null ? opts[sel[bi]] : null;
      let cls = 'inline-blank-choice';
      if (bi===activeIdx && !revealed) cls += ' active';
      if (picked) cls += ' filled';
      if (revealed && picked) cls += picked.correct ? ' correct' : ' wrong';
      const content = picked ? Utils.escapeHtml(picked.text) : '<span class="blank-line-only" aria-hidden="true"></span>';
      return ` <button type="button" class="${cls}" data-blank-nav="${bi}" ${revealed?'disabled':''} aria-label="填空">${content}</button>`;
    }).join('');
  }
  return html;
}
function renderInteractiveFace(sess, card){
  const mode = sess.mode;
  let body = '', actions = '';
  if (card._perBlankChoice){
    const sel = sess.selectedPerBlank || new Array(card._blankOptions.length).fill(null);
    const active = Utils.clamp(sess.activeBlankIdx||0, 0, card._blankOptions.length-1);
    const activeOpts = card._blankOptions[active] || [];
    const optsHtml = activeOpts.map((o,oi)=>{
      let cls = sel[active]===oi ? 'selected' : '';
      return `<button type="button" class="opt-btn ${cls}" data-blank-option="${oi}" ${sess.revealed?'disabled':''}>
        <span class="opt-key">${String.fromCharCode(65+oi)}</span><span class="opt-text">${Utils.escapeHtml(o.text)}</span></button>`;
    }).join('');
    if (!sess.revealed){
      body += `<div class="opt-list opt-list-free per-blank-options">${optsHtml}</div>`;
    }
    if (!sess.revealed){
      const allPicked = sel.every(v=>v!=null);
      const showConfirm = allPicked && active===card._blankOptions.length-1;
      const prevBtn = active>0 ? `<button type="button" class="btn btn-secondary" id="prev-blank-btn">上一空</button>` : '';
      const nextBtn = active<card._blankOptions.length-1 && sel[active]!=null ? `<button type="button" class="btn btn-secondary" id="next-blank-btn">下一空</button>` : '';
      const confirmBtn = showConfirm ? `<button type="button" class="btn btn-primary" id="confirm-btn">确认 <span class="kbd">⏎</span></button>` : '';
      actions = (prevBtn || nextBtn || confirmBtn) ? `<div class="qcard-actions">${prevBtn}${nextBtn}${confirmBtn}</div>` : '';
    }

      const isSel = selIdxs.includes(i);

      return `<button type="button" class="opt-btn ${cls}" data-opt="${i}" ${sess.revealed?'disabled':''}>
        <span class="opt-key">${isSel?'✓':String.fromCharCode(65+i)}</span><span class="opt-text">${Utils.escapeHtml(o.text)}</span></button>`;
    }).join('') + `</div>`;
    if (!sess.revealed) actions = `<div class="qcard-actions"><button type="button" class="btn btn-primary" id="confirm-btn" ${selIdxs.length===0?'disabled':''}>确认 <span class="kbd">⏎</span></button></div>`;
  } else if (card.type==='singleChoice' || card._dynamicChoice){
    const optListClass = card._dynamicChoice ? 'opt-list opt-list-free' : 'opt-list';
    body = `<div class="${optListClass}">` + card.options.map((o,i)=>{
      let cls = sess.selectedOptionIdx===i ? 'selected' : '';
      if (sess.revealed){ if (o.correct) cls='correct'; else if (sess.selectedOptionIdx===i) cls='wrong'; }
      return `<button type="button" class="opt-btn ${cls}" data-opt="${i}" ${sess.revealed?'disabled':''}>
        <span class="opt-key">${String.fromCharCode(65+i)}</span><span class="opt-text">${Utils.escapeHtml(o.text)}</span></button>`;
    }).join('') + `</div>`;
    if (!sess.revealed) actions = `<div class="qcard-actions"><button type="button" class="btn btn-primary" id="confirm-btn" ${sess.selectedOptionIdx==null?'disabled':''}>确认 <span class="kbd">⏎</span></button></div>`;
  } else if (card.type==='trueFalse'){
    body = `<div class="tf-row">` + [true,false].map(v=>{
      let cls = sess.selectedTF===v ? 'selected' : '';
      if (sess.revealed){ if (card.answer===v) cls='correct'; else if (sess.selectedTF===v) cls='wrong'; }
      return `<button type="button" class="tf-btn ${cls}" data-tf="${v}" ${sess.revealed?'disabled':''}>${v?'对':'错'}<span class="kbd">${v?'1':'2'}</span></button>`;
    }).join('') + `</div>`;
    if (!sess.revealed) actions = `<div class="qcard-actions"><button type="button" class="btn btn-primary" id="confirm-btn" ${sess.selectedTF==null?'disabled':''}>确认 <span class="kbd">⏎</span></button></div>`;
  } else if (card.type==='fillInTheBlank'){
    const parts = Utils.escapeHtml(card.question).split(/_{2,}/);
    const inputCls = sess.revealed ? (sess.lastGradeCorrect?'correct':'wrong') : '';
    const inputHtml = `<span class="blank-wrap" style="--blank-chars:${blankInputChars(sess.userTextAnswer||'')}"><input type="text" class="qcard-blank-input ${inputCls}" id="blank-input" value="${Utils.escapeHtml(sess.userTextAnswer||'')}" ${sess.revealed?'disabled':''} placeholder="" autocomplete="off" autocapitalize="off" spellcheck="false"><span class="blank-underline"></span></span>`;
    body = `<div class="qcard-question">${parts.join(inputHtml)}</div>`;
    if (sess.revealed){
      body += `<div class="reveal-divider"></div><div class="reveal-label">正确答案</div><div class="reveal-answer">${Utils.escapeHtml(card.answers.join(' / '))}</div>`;
    } else {
      actions = `<div class="qcard-actions"><button type="button" class="btn btn-primary" id="confirm-btn">确认 <span class="kbd">⏎</span></button></div>`;
    }
  } else { // shortAnswer / essay
    if (!sess.revealed){
      body = `<textarea class="essay-input" id="essay-input" placeholder="写下你的回答……（也可留空直接查看参考答案）">${Utils.escapeHtml(sess.userTextAnswer||'')}</textarea>`;
      const btnLabel = mode==='test' ? '下一题' : '提交并查看参考答案';
      actions = `<div class="qcard-actions"><button type="button" class="btn btn-primary" id="confirm-btn">${btnLabel}</button></div>`;
    } else {
      body = `<div class="reveal-label">你的回答</div><div class="your-answer-box">${(sess.userTextAnswer&&sess.userTextAnswer.trim())?Utils.escapeHtml(sess.userTextAnswer):'（未作答）'}</div>
        <div class="reveal-divider"></div><div class="reveal-label">参考答案</div><div class="reveal-answer">${Utils.escapeHtml(card.reference)}</div>`;
      actions = renderSelfGradeGrid();
    }
  }
  const isChoiceStyled = card._dynamicChoice || card._perBlankChoice;
  const topQuestionHtml = card._perBlankChoice
    ? renderPerBlankQuestionHtml(card, sess.selectedPerBlank || new Array(card._blankOptions.length).fill(null), Utils.clamp(sess.activeBlankIdx||0, 0, card._blankOptions.length-1), sess.revealed)
    : (isChoiceStyled ? Utils.escapeHtml(card.question).replace(/_{2,}/g,'<span class="blank" aria-hidden="true"></span>') : renderQuestionText(card));
  const showTopQuestion = card._perBlankChoice || (card.type!=='fillInTheBlank' || isChoiceStyled);
  const modeLabel = (mode==='learn'?'学习模式':'测试模式') + (isChoiceStyled?(card._perBlankChoice?' · 选择模式':((card.type==='multipleChoice'||card._multiSelect)?' · 选择模式(可多选)':' · 选择模式')):(card.type==='multipleChoice'?' · 可多选':''));
  const bodyClass = `qcard-body${card._perBlankChoice ? ' per-blank-body' : (isChoiceStyled ? ' choice-mode-body' : '')}`;
  return `<div class="${cardClasses(sess)}" id="qcard-el">
    ${renderQuestionTools(card)}
    ${typeLabelHtml(card, modeLabel)}
    ${showTopQuestion ? `<div class="qcard-question">${topQuestionHtml}</div>` : ''}
    <div class="${bodyClass}">${body}</div>
    ${actions}
  </div>`;
}

function updatePerBlankUI(){

  const sel = sess.selectedPerBlank || [];
  const active = sess.activeBlankIdx || 0;
  document.querySelectorAll('[data-blank-option]').forEach(btn=>{
    const oi = +btn.dataset.blankOption;
    btn.classList.toggle('selected', sel[active]===oi);
  });
  const cb = document.getElementById('confirm-btn');
  if (cb) cb.disabled = !sel.every(v=>v!=null);
}
function choosePerBlankOption(oi){
  const sess = App.session, card = sess.queue[0];
  if (!card || !card._perBlankChoice || sess.revealed) return;
  sess.selectedPerBlank = sess.selectedPerBlank || new Array(card._blankOptions.length).fill(null);
  const active = Utils.clamp(sess.activeBlankIdx||0, 0, card._blankOptions.length-1);
  sess.selectedPerBlank[active] = oi;
  if (active < card._blankOptions.length-1){
    sess.activeBlankIdx = active+1;
  }
  persistActiveSession();
  render();
}
function bindCardEvents(sess, card){
  document.querySelectorAll('[data-bookmark]').forEach(btn=>btn.addEventListener('click', e=>{
    e.stopPropagation();
    toggleReviewBook(btn.dataset.bookmark);
  }));
  if (sess.mode==='flashcard'){
    if (!sess.revealed){
      const el = document.getElementById('qcard-el');
      if (el) el.addEventListener('click', flipCurrentCard);
    } else {
      document.querySelectorAll('[data-rate]').forEach(btn=>btn.addEventListener('click', e=>{ e.stopPropagation(); submitFlashcardRating(btn.dataset.rate); }));
    }
    return;
  }
  if (card._perBlankChoice){
    if (!sess.revealed){
      sess.selectedPerBlank = sess.selectedPerBlank || new Array(card._blankOptions.length).fill(null);
      document.querySelectorAll('[data-blank-nav]').forEach(btn=>btn.addEventListener('click', ()=>{
        sess.activeBlankIdx = +btn.dataset.blankNav;
        persistActiveSession();
        render();
      }));
      document.querySelectorAll('[data-blank-option]').forEach(btn=>btn.addEventListener('click', ()=>choosePerBlankOption(+btn.dataset.blankOption)));
      const prevBlankBtn = document.getElementById('prev-blank-btn');
      if (prevBlankBtn) prevBlankBtn.onclick = ()=>{
        sess.activeBlankIdx = Math.max(0, (sess.activeBlankIdx||0)-1);
        persistActiveSession();
        render();
      };
      const nextBlankBtn = document.getElementById('next-blank-btn');
      if (nextBlankBtn) nextBlankBtn.onclick = ()=>{
        sess.activeBlankIdx = Math.min(card._blankOptions.length-1, (sess.activeBlankIdx||0)+1);
        persistActiveSession();
        render();
      };
      const cb = document.getElementById('confirm-btn');
      if (cb) cb.onclick = ()=>{ if (sess.selectedPerBlank.every(v=>v!=null)) submitObjectiveAnswer(sess.selectedPerBlank.slice()); };
    }
  } else if (card.type==='multipleChoice' || card._multiSelect){
    if (!sess.revealed){
      document.querySelectorAll('[data-opt]').forEach(btn=>btn.addEventListener('click', ()=>{
        const idx = +btn.dataset.opt;
        sess.selectedOptionIdxs = sess.selectedOptionIdxs || [];
        const pos = sess.selectedOptionIdxs.indexOf(idx);
        if (pos>=0) sess.selectedOptionIdxs.splice(pos,1); else sess.selectedOptionIdxs.push(idx);
        updateMultiSelectUI();
        persistActiveSession();
      }));
      const cb = document.getElementById('confirm-btn');
      if (cb) cb.onclick = ()=>{ if ((sess.selectedOptionIdxs||[]).length) submitObjectiveAnswer(sess.selectedOptionIdxs); };
    }
  } else if (card.type==='singleChoice' || card._dynamicChoice){
    if (!sess.revealed){
      document.querySelectorAll('[data-opt]').forEach(btn=>btn.addEventListener('click', ()=>{ sess.selectedOptionIdx=+btn.dataset.opt; updateOptionSelectionUI(); persistActiveSession(); }));
      const cb = document.getElementById('confirm-btn');
      if (cb) cb.onclick = ()=>{ if (sess.selectedOptionIdx!=null) submitObjectiveAnswer(sess.selectedOptionIdx); };
    }
  } else if (card.type==='trueFalse'){
    if (!sess.revealed){
      document.querySelectorAll('[data-tf]').forEach(btn=>btn.addEventListener('click', ()=>{ sess.selectedTF = btn.dataset.tf==='true'; updateTFSelectionUI(); persistActiveSession(); }));
      const cb = document.getElementById('confirm-btn');
      if (cb) cb.onclick = ()=>{ if (sess.selectedTF!=null) submitObjectiveAnswer(sess.selectedTF); };
    }
  } else if (card.type==='fillInTheBlank'){
    const input = document.getElementById('blank-input');
    if (input) syncBlankInputWidth(input);
    if (input && !sess.revealed){
      input.focus();
      input.addEventListener('input', ()=>{ syncBlankInputWidth(input); sess.userTextAnswer = input.value; persistActiveSession(); });
      input.addEventListener('keydown', e=>{ if (e.key==='Enter'){ e.preventDefault(); submitObjectiveAnswer(sess.userTextAnswer); } });
    }
    const cb = document.getElementById('confirm-btn');
    if (cb) cb.onclick = ()=>submitObjectiveAnswer(sess.userTextAnswer);
  } else { // shortAnswer / essay
    if (!sess.revealed){
      const ta = document.getElementById('essay-input');
      if (ta){
        ta.addEventListener('input', ()=>{ sess.userTextAnswer = ta.value; persistActiveSession(); });
        ta.addEventListener('keydown', e=>{ if ((e.metaKey||e.ctrlKey) && e.key==='Enter'){ e.preventDefault(); submitEssayAnswer(); } });
      }
      const cb = document.getElementById('confirm-btn');
      if (cb) cb.onclick = submitEssayAnswer;
    } else {
      document.querySelectorAll('[data-sg]').forEach(btn=>btn.addEventListener('click', ()=>submitLearnSubjective(btn.dataset.sg)));
    }
  }
}
function flashFeedback(kind){
  const el = document.createElement('div');
  el.className = `feedback-flash show ${kind}`;
  el.textContent = kind==='good' ? '✓ 答对了' : '✗ 答错了';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 850);
}
function flipCurrentCard(){
  const sess = App.session;
  if (!sess || sess.mode!=='flashcard' || sess.revealed) return;
  sess.revealed = true;
  persistActiveSession();
  render();
}
function submitFlashcardRating(ratingKey){
  const sess = App.session, card = sess.queue[0];
  const g = gradeFlashcardRating(card, ratingKey);
  recordResult(card, g);
  const newSrsState = applySrsRating(App.srs[card.uid], ratingKey);
  App.srs[card.uid] = newSrsState;
  completeCurrentCard({ requeue:newSrsState.requeue, requeueDelay:3 });
}
function stashAnswerForCard(sess, card, input){
  sess.answersByUid = sess.answersByUid || {};
  sess.answersByUid[card.uid] = input;
}
function resetAnswerStateForCard(sess, card){
  sess.revealed=false;
  sess.selectedOptionIdx=null;
  sess.selectedOptionIdxs=[];
  sess.selectedTF=null;
  sess.userTextAnswer='';
  sess.activeBlankIdx=0;
  sess.selectedPerBlank = card && card._perBlankChoice ? new Array(card._blankOptions.length).fill(null) : null;
}
function currentDraftAnswer(sess, card){
  if (!sess || !card) return undefined;
  if (card._perBlankChoice) return Array.isArray(sess.selectedPerBlank) ? sess.selectedPerBlank.slice() : undefined;
  if (card.type==='multipleChoice' || card._multiSelect) return Array.isArray(sess.selectedOptionIdxs) ? sess.selectedOptionIdxs.slice() : [];
  if (card.type==='singleChoice' || card._dynamicChoice) return sess.selectedOptionIdx;
  if (card.type==='trueFalse') return sess.selectedTF;
  return sess.userTextAnswer || '';
}
function hasMeaningfulDraft(card, draft){
  if (draft===undefined || draft===null) return false;
  if (Array.isArray(draft)) return card && card._perBlankChoice ? draft.some(v=>v!=null) : draft.length>0;
  if (typeof draft==='string') return draft.length>0;
  return true;
}
function saveCurrentDraftAnswer(sess, card){
  if (!sess || !card || sess.mode==='flashcard') return;
  const draft = currentDraftAnswer(sess, card);
  if (hasMeaningfulDraft(card, draft)) stashAnswerForCard(sess, card, draft);
}
function prepareCardState(sess, card){
  resetAnswerStateForCard(sess, card);
  if (sess.mode==='test') restoreAnswerForCard(sess, card);
}
function restoreAnswerForCard(sess, card){
  const saved = (sess.answersByUid||{})[card.uid];
  resetAnswerStateForCard(sess, card);
  if (saved===undefined) return;
  if (card._perBlankChoice) sess.selectedPerBlank = Array.isArray(saved) ? saved.slice() : sess.selectedPerBlank;
  else if (card.type==='multipleChoice' || card._multiSelect) sess.selectedOptionIdxs = Array.isArray(saved) ? saved.slice() : [];
  else if (card.type==='singleChoice' || card._dynamicChoice) sess.selectedOptionIdx = saved;
  else if (card.type==='trueFalse') sess.selectedTF = saved;
  else sess.userTextAnswer = saved || '';
}
function submitObjectiveAnswer(userInput){
  const sess = App.session;
  if (sess.mode==='test'){
    const card = sess.queue[0];
    stashAnswerForCard(sess, card, userInput);
    const g = gradeObjective(card, userInput);
    recordResult(card, g);
    completeCurrentCard({ requeue:false });
  } else {
    submitLearnObjective(userInput);
  }
}
function submitLearnObjective(userInput){
  const sess = App.session, card = sess.queue[0];
  const g = gradeObjective(card, userInput);
  recordResult(card, g);
  sess.feedbackFlash = g.isCorrect ? 'good' : 'bad';
  sess.revealed = true;
  sess.lastUserInput = userInput;
  sess.lastGradeCorrect = g.isCorrect;
  const requeueNeeded = !g.isCorrect && (sess.requeueCounts[card.uid]||0) < 1;
  sess.pendingCompletion = { requeue:requeueNeeded, requeueDelay:3, dueAt:Date.now()+(g.isCorrect ? 750 : 1150) };
  persistActiveSession();
  render();
  flashFeedback(g.isCorrect ? 'good' : 'bad');
}
function submitLearnSubjective(ratingKey){
  const sess = App.session, card = sess.queue[0];
  const g = gradeSubjective(card, sess.userTextAnswer, ratingKey);
  recordResult(card, g);
  const requeueNeeded = g.pct<80 && (sess.requeueCounts[card.uid]||0) < 1;
  if (requeueNeeded) sess.requeueCounts[card.uid] = (sess.requeueCounts[card.uid]||0)+1;
  completeCurrentCard({ requeue:requeueNeeded, requeueDelay:3 });
}
function submitEssayAnswer(){
  const sess = App.session, card = sess.queue[0];
  if (sess.mode==='test'){
    stashAnswerForCard(sess, card, sess.userTextAnswer);
    recordPendingSubjective(card, sess.userTextAnswer);
    completeCurrentCard({ requeue:false });
  } else {
    sess.revealed = true;
    persistActiveSession();
    render();
  }
}
async function exitSessionNow(){
  const sess = App.session;
  if (!sess){ App.view='setup'; render(); return; }
  if (sess._pendingTimer) clearTimeout(sess._pendingTimer);
  if (sess.baseSrs) App.srs = Utils.deepClone(sess.baseSrs);
  const hasAnswered = sess.results.some(r=>r.graded!==false);
  const partial = hasAnswered ? buildRecordFromSession(sess, {partial:true, id:Utils.uid('exit')}) : null;
  await clearActiveSessionDraft();
  App.session = null;
  if (partial && partial.totalQuestions>0){
    App.lastReport = partial;
    App.view = 'report';
  } else {
    App.view = 'setup';
  }
  render();
}
function confirmExitSession(){
  const sess = App.session;
  if (!sess){ App.view='setup'; render(); return; }
  confirmModal(
    '退出本轮测试？',
    '本轮未完成，退出后不会保存进度，也不会计入统计；已作答内容仅用于显示本次临时结果。',
    exitSessionNow,
    { danger:true, confirmLabel:'退出' }
  );
}

function handleGlobalKeydown(e){
  if (document.getElementById('modal-overlay')){
    if (e.key==='Escape'){ e.preventDefault(); closeModal(); }
    return;
  }
  if (App.view==='grading'){
    if (['1','2','3','4'].includes(e.key)){
      const map={'1':'again','2':'hard','3':'good','4':'easy'};
      const btn = document.querySelector(`[data-sg="${map[e.key]}"]`);
      if (btn){ e.preventDefault(); btn.click(); }
    }
    return;
  }
  if (App.view!=='quiz') return;
  const sess = App.session;
  if (!sess) return;
  const card = sess.queue[0];
  if (!card) return;
  const activeTag = document.activeElement && document.activeElement.tagName;
  const inTextField = activeTag==='INPUT' || activeTag==='TEXTAREA';

  if (e.key==='Escape'){ e.preventDefault(); confirmExitSession(); return; }
  if (e.key==='ArrowLeft' && sess.mode==='test' && sess.answeredStack && sess.answeredStack.length && !inTextField){
    e.preventDefault(); goToPreviousQuestion(); return;
  }

  if (sess.mode==='flashcard'){
    if (!sess.revealed){ if (e.key===' '){ e.preventDefault(); flipCurrentCard(); } return; }
    if (['1','2','3','4'].includes(e.key)){
      e.preventDefault();
      submitFlashcardRating({'1':'again','2':'hard','3':'good','4':'easy'}[e.key]);
    }
    return;
  }
  if (sess.revealed){
    if ((card.type==='shortAnswer'||card.type==='essay') && ['1','2','3','4'].includes(e.key)){
      e.preventDefault();
      submitLearnSubjective({'1':'again','2':'hard','3':'good','4':'easy'}[e.key]);
    }
    return;
  }
  if (inTextField) return; // 交给输入框自身的 keydown 处理 Enter / Ctrl+Enter
  if (card._perBlankChoice){
    const active = Utils.clamp(sess.activeBlankIdx||0, 0, card._blankOptions.length-1);
    const idx = +e.key-1;
    if (e.key>='1' && e.key<='8' && idx<(card._blankOptions[active]||[]).length){
      e.preventDefault();
      choosePerBlankOption(idx);
    } else if (e.key==='Enter' && (sess.selectedPerBlank||[]).every(v=>v!=null)){
      e.preventDefault();
      submitObjectiveAnswer(sess.selectedPerBlank.slice());
    }
  } else if (card.type==='multipleChoice' || card._multiSelect){
    const idx = +e.key-1;
    if (e.key>='1' && e.key<='8' && idx<card.options.length){
      e.preventDefault();
      sess.selectedOptionIdxs = sess.selectedOptionIdxs || [];
      const pos = sess.selectedOptionIdxs.indexOf(idx);
      if (pos>=0) sess.selectedOptionIdxs.splice(pos,1); else sess.selectedOptionIdxs.push(idx);
      updateMultiSelectUI();
      persistActiveSession();
    } else if (e.key==='Enter' && (sess.selectedOptionIdxs||[]).length){ e.preventDefault(); submitObjectiveAnswer(sess.selectedOptionIdxs); }
  } else if (card.type==='singleChoice' || card._dynamicChoice){
    if (['1','2','3','4'].includes(e.key)){
      const idx = +e.key-1;
      if (idx<card.options.length){ e.preventDefault(); sess.selectedOptionIdx=idx; updateOptionSelectionUI(); persistActiveSession(); }
    } else if (e.key==='Enter' && sess.selectedOptionIdx!=null){ e.preventDefault(); submitObjectiveAnswer(sess.selectedOptionIdx); }
  } else if (card.type==='trueFalse'){
    if (e.key==='1'){ e.preventDefault(); sess.selectedTF=true; updateTFSelectionUI(); persistActiveSession(); }
    else if (e.key==='2'){ e.preventDefault(); sess.selectedTF=false; updateTFSelectionUI(); persistActiveSession(); }
    else if (e.key==='Enter' && sess.selectedTF!=null){ e.preventDefault(); submitObjectiveAnswer(sess.selectedTF); }
  }
}

function renderPreviewSidebar(grouped, idPrefix, opts={}){
  const detailMap = opts.detailMap || null;
  const statusLegend = detailMap ? (opts.mode==='flashcard'
    ? `<div class="sidebar-legend"><span><i class="status-no"></i>未掌握</span><span><i class="status-mid"></i>复习中</span><span><i class="status-good"></i>基本掌握</span><span><i class="status-ok"></i>已掌握</span></div>`
    : `<div class="sidebar-legend"><span><i class="status-ok"></i>正确</span><span><i class="status-no"></i>错误</span></div>`) : '';
  const body = grouped.map(g=>{
    const entries = g.questions ? g.questions.map(q=>({question:q})) : g.items;
    let lastChapter = null;
    const cells = entries.map((entry,i)=>{
      const q = entry.question;
      const d = detailMap ? detailMap.get(q.uid) : null;
      let statusClass = '';
      if (detailMap){
        let heatStatus = d ? d.status : 'empty';
        if (opts.mode==='flashcard') heatStatus = flashcardHeatStatus(d);
        else heatStatus = heatStatus==='ok' ? 'ok' : (heatStatus==='empty' ? 'empty' : 'no');
        statusClass = ` status-${['ok','good','mid','no','empty'].includes(heatStatus)?heatStatus:'no'}`;
      }
      const chapter = opts.showChapters ? (q.chapter || (entry.detail && entry.detail.chapter) || (d && d.chapter) || '') : '';
      const chapterLabel = chapter && chapter!==lastChapter ? `<div class="nav-chapter-label">${Utils.escapeHtml(chapter)}</div>` : '';
      if (chapter) lastChapter = chapter;
      return `${chapterLabel}<a href="#${idPrefix}-${q.uid}" class="nav-cell${statusClass}" data-jump="${q.uid}" title="${Utils.escapeHtml(q.question.slice(0,30))}"><span class="nav-cell-num">${i+1}</span></a>`;
    }).join('');
    return `<h5>${QuestionTypes[g.type].label} (${entries.length})</h5><div class="nav-grid">${cells}</div>`;
  }).join('');
  return statusLegend + body;
}
function flashcardHeatStatus(detail){
  if (!detail) return 'empty';
  let pct = typeof detail.pct==='number' ? detail.pct : null;
  if (pct==null && Number(detail.maxScore)>0) pct = (Number(detail.scoreEarned)||0) / Number(detail.maxScore) * 100;
  if (pct==null) return detail.status || 'empty';
  if (pct>=99.5) return 'ok';
  if (pct>=80) return 'good';
  if (pct>=50) return 'mid';
  return 'no';
}
function renderInlineFillQuestion(q, showAns){
  let i = 0;
  const answers = q.answers || [];
  return Utils.escapeHtml(q.question).replace(/_{2,}/g, ()=>{
    const ans = answers[i] != null ? answers[i] : answers[answers.length-1];
    i++;
    if (!showAns) return '<span class="browse-blank-line" aria-hidden="true"></span>';
    return `<span class="browse-inline-answer">${Utils.escapeHtml(String(ans||'').split('/')[0])}</span>`;
  });
}
function userAnswerParts(detail){
  if (!detail || !detail.userAnswer) return [];
  return String(detail.userAnswer).split(/[、/]/).map(s=>s.trim()).filter(Boolean);
}
function renderPreviewQuestion(q, num, opts={}){
  const showAns = !!opts.showAns;
  const detail = opts.detail || null;
  const idPrefix = opts.idPrefix || 'bq';
  const rawStatus = detail ? detail.status : '';
  const status = (opts.mode && opts.mode!=='flashcard' && rawStatus==='mid') ? 'no' : rawStatus;
  const starred = App.deck && isInNotebook('review', q.uid, App.deck.id);
  const wrong = App.deck && isInNotebook('wrong', q.uid, App.deck.id);
  const actions = opts.actions ? `<div class="preview-actions">
    ${wrong ? `<button type="button" class="mini-remove-btn" data-wrong-remove="${q.uid}">移出错题本</button>` : ''}
    <button type="button" class="bookmark-btn ${starred?'on':''}" data-review-toggle="${q.uid}" title="${starred?'移出复习本':'加入复习本'}" aria-label="${starred?'移出复习本':'加入复习本'}" aria-pressed="${starred?'true':'false'}">${starred?'★':'☆'}</button>
  </div>` : '';
  let bodyHtml = '';
  if ((q.type==='singleChoice' || q.type==='multipleChoice') && Array.isArray(q.options)){
    const parts = userAnswerParts(detail);
    bodyHtml = `<div class="browse-q-opts">` + q.options.map((o,i)=>{
      const userPicked = parts.includes(o.text);
      const cls = `${showAns && o.correct?'is-correct':''} ${detail && userPicked && !o.correct?'is-wrong':''} ${detail && userPicked?'is-picked':''}`;
      return `<div class="opt-row ${cls}"><span>${String.fromCharCode(65+i)}.</span> ${Utils.escapeHtml(o.text)}${showAns && o.correct?' ✓':''}${detail && userPicked?' · 你的选择':''}</div>`;
    }).join('') + `</div>`;
  } else if (q.type==='trueFalse'){
    const choices = [true,false].map(v=>{
      const correct = showAns && q.answer===v;
      const picked = detail && detail.userAnswer===(v?'对':'错');
      return `<div class="tf-mini ${correct?'is-correct':''} ${picked&&!correct?'is-wrong':''} ${picked?'is-picked':''}">${v?'对':'错'}${correct?' ✓':''}${picked?' · 你的选择':''}</div>`;
    }).join('');
    bodyHtml = `<div class="tf-mini-row">${choices}</div>`;
  } else if (q.type==='fillInTheBlank'){
    if (detail) bodyHtml = `<div class="preview-user-line ${detail.status==='ok'?'ok':'no'}">你的答案：${Utils.escapeHtml(detail.userAnswer||'（未作答）')}</div>`;
  } else if (showAns){
    bodyHtml = `<div class="browse-answer">${Utils.escapeHtml(q.reference || (detail&&detail.correctAnswer) || '')}</div>`;
  }
  if (!bodyHtml && showAns && detail && detail.correctAnswer){
    bodyHtml = `<div class="browse-answer">${Utils.escapeHtml(detail.correctAnswer)}</div>`;
  }
  const qText = q.type==='fillInTheBlank' ? renderInlineFillQuestion(q, showAns) : Utils.escapeHtml(q.question);
  const statusBadge = detail ? `<span class="preview-status ${status}">${status==='ok'?'正确':(status==='mid'?'复习中':'错误')}</span>` : '';
  return `<div class="browse-q ${detail?'with-status status-'+status:''}" id="${idPrefix}-${q.uid}">
    <div class="preview-q-head">
      <div class="browse-q-text"><span class="browse-q-num">${num}.</span>${qText}</div>
      ${actions}
    </div>
    <div class="preview-meta">
      ${q.chapter ? `<span class="chapter-pill">${Utils.escapeHtml(q.chapter)}</span>` : ''}
      ${statusBadge}
      ${detail ? `<span>${Utils.fmtScore(detail.scoreEarned)}/${Utils.fmtScore(detail.maxScore)} 分</span>` : ''}
    </div>
    ${bodyHtml}
  </div>`;
}

function setupBrowseScrollSpy(container, idPrefix='bq'){
  const cells = container.querySelectorAll('[data-jump]');
  const targets = [...container.querySelectorAll('.browse-q')];
  if (!('IntersectionObserver' in window) || !targets.length) return;
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (entry.isIntersecting){
        const uid = entry.target.id.replace(idPrefix+'-','');
        cells.forEach(c=>c.classList.toggle('active', c.dataset.jump===uid));
      }
    });
  }, { rootMargin:'-15% 0px -70% 0px' });
  targets.forEach(t=>obs.observe(t));
}

function animateScoreCounter(target){
  const el = document.getElementById('score-counter');
  if (!el) return;
  const dur=700, start=performance.now();
  function step(now){
    const p = Utils.clamp((now-start)/dur,0,1);
    const eased = 1-Math.pow(1-p,3);
    el.textContent = Utils.fmtScore(target*eased);
    if (p<1) requestAnimationFrame(step); else el.textContent = Utils.fmtScore(target);
  }
  requestAnimationFrame(step);
}
function buildTypeBarChart(items){
  if (!items.length) return `<div class="chart-empty">暂无数据</div>`;
  return `<div class="type-breakdown">` + items.map(a=>`
    <div class="tb-row">

      <div class="tb-bar-track"><div class="tb-bar-fill" style="width:${a.pct}%"></div></div>
      <div class="tb-pct">${a.sub||(a.pct+'%')}</div>
    </div>`).join('') + `</div>`;
}
function buildSparkline(values){
  if (!values.length) return `<div class="chart-empty">还没有学习记录</div>`;
  const mobileChart = isMobileViewport();
  const mobileH = 168;
  const w=600,h=mobileChart?mobileH:150,padL=58,padR=8,padY=mobileChart?24:22;
  const cssWidthPx = Math.max(260, Math.round((Math.max(1, values.length-1) * 42) + 148));
  const n=values.length, stepX = n>1 ? (w-padL-padR)/(n-1) : 0;
  const points = values.map((v,i)=>[ padL+i*stepX, padY+(1-Utils.clamp(v,0,100)/100)*(h-2*padY) ]);
  const pathD = points.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaD = pathD+` L${points[points.length-1][0].toFixed(1)},${h-padY} L${points[0][0].toFixed(1)},${h-padY} Z`;
  const dots = points.map(p=>`<circle class="sparkline-dot" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="var(--accent)"/>`).join('');
  const gridLines = [0,50,100].map(v=>{
    const y=padY+(1-v/100)*(h-2*padY);
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--border-soft)" stroke-width="1"/><text x="4" y="${(y+(mobileChart?7:4)).toFixed(1)}" font-size="${mobileChart?20:12}" fill="var(--text-faint)">${v}</text>`;
  }).join('');
  const heightStyle = mobileChart ? '' : 'height:auto;';
  return `<div class="sparkline-scroll"><svg class="sparkline-chart" viewBox="0 0 ${w} ${h}" style="width:max(100%, ${cssWidthPx}px);min-width:100%;aspect-ratio:${w}/${h};${heightStyle}overflow:visible;display:block;">
    ${gridLines}
    <path d="${areaD}" fill="var(--accent-glow)" stroke="none"/>
    <path class="sparkline-line" d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg></div>`;
}
function aggregateByType(sessions){
  const agg = {}; TYPE_ORDER.forEach(t=>agg[t]={score:0,maxScore:0});
  sessions.forEach(s=>TYPE_ORDER.forEach(t=>{ const b=s.byType&&s.byType[t]; if(b){ agg[t].score+=b.score; agg[t].maxScore+=b.maxScore; } }));
  return TYPE_ORDER.filter(t=>agg[t].maxScore>0).map(t=>({ type:t, pct:Math.round((agg[t].score/agg[t].maxScore)*100) }));
}
function findSessionRecord(id){
  return (App.progress.sessions||[]).find(s=>s.id===id) || (App.lastReport && App.lastReport.id===id ? App.lastReport : null);
}
function questionFromRecord(record, uid, detail){
  const snap = (record.questionSnapshots||[]).find(q=>q.uid===uid);
  if (snap) return Object.assign({}, snap, { chapter:snap.chapter || (detail&&detail.chapter) || '' });
  if (App.deck && App.deck.id===record.deckId){
    const q = findDeckQuestion(uid);
    if (q) return Object.assign({}, q, { chapter:q.chapter || (detail&&detail.chapter) || '' });
  }
  if (detail){
    return {
      uid:detail.uid, type:detail.type, chapter:detail.chapter||'', question:detail.question,
      objective:QuestionTypes[detail.type] ? QuestionTypes[detail.type].objective : true,
      reference:detail.correctAnswer,
      answers:detail.type==='fillInTheBlank' ? [detail.correctAnswer] : undefined
    };
  }
  return null;
}
function recordQuestionList(record){
  const detailMap = new Map((record.details||[]).map(d=>[d.uid,d]));
  const uids = (record.paperUids&&record.paperUids.length) ? record.paperUids : (record.details||[]).map(d=>d.uid);
  return uids.map(uid=>{
    const detail = detailMap.get(uid);
    const question = questionFromRecord(record, uid, detail);
    return question ? { question, detail:detail||null } : null;
  }).filter(Boolean);
}

      <div class="panel chart-panel trend-chart-panel"><h4>最近正确率趋势</h4>${trendChart}</div>
      <div class="panel chart-panel"><h4>各题型累计得分率</h4>${typeChart}</div>
      <div class="section-title">学习记录<span class="line"></span></div>
      ${sessions.length ? `<p class="muted record-preview-hint">点击任意记录可进入整卷预览，右侧导航栏会标出正误并可快速定位。</p>` : ''}
      ${sessions.length ? `<div class="history-table-wrap"><table class="history-table">
        <thead><tr><th>时间</th><th>学习内容</th><th>得分</th><th>正确率</th><th>用时</th><th>操作</th></tr></thead>
        <tbody>${historyRows}</tbody></table></div>`
        : `<div class="empty-state"><span class="e-icon">📭</span><p>还没有任何学习记录，快去开始第一轮学习吧！</p></div>`}
      <div class="section-title" style="margin-top:26px;">数据管理<span class="line"></span></div>
      <div class="panel">
        <p class="muted" style="font-size:12.5px;margin:0 0 12px;">当前存储方式：${Store.backend()==='cloud'?'Claude 云端会话存储（随本次对话保存）':'本机浏览器本地存储（保存在这台设备上，下次打开同一文件仍可读取）'}</p>
        <div class="settings-actions">
          <button class="btn btn-secondary" id="export-data-btn" type="button">导出数据</button>
          <button class="btn btn-secondary" id="import-data-btn" type="button">导入数据</button>
          <button class="btn btn-danger" id="clear-history-btn" type="button">清空数据</button>
          <input type="file" id="import-data-input" class="hidden-input" accept="application/json,.json">
        </div>
        <p class="muted" style="font-size:11.5px;margin:10px 0 0;">导出包含设置、学习记录、复习本、错题本与逐题统计；导入时自动合并已有记录。</p>
      </div>
    </div>
  `;
  container.querySelectorAll('[data-session-id]').forEach(row=>{
    const openRecord = ()=>{
      App.recordDetailId = row.dataset.sessionId;
      App.view = 'record';
      render();
    };
    row.addEventListener('click', openRecord);
    row.addEventListener('keydown', e=>{
      if (e.key==='Enter' || e.key===' '){
        e.preventDefault();
        openRecord();
      }
    });
  });
  container.querySelectorAll('[data-delete-session]').forEach(btn=>btn.addEventListener('click', e=>{
    e.stopPropagation();
    const id = btn.dataset.deleteSession;
    confirmModal('删除这条学习记录？', '此操作会从统计中移除该轮学习记录，并重新计算总览数据。', ()=>deleteSessionRecord(id), { danger:true, confirmLabel:'删除' });
  }));
  document.getElementById('export-data-btn').onclick = exportAllData;
  document.getElementById('import-data-btn').onclick = ()=>document.getElementById('import-data-input').click();
  document.getElementById('import-data-input').onchange = (e)=>{ if (e.target.files[0]) importData(e.target.files[0]); e.target.value=''; };
  document.getElementById('clear-history-btn').onclick = ()=>{
    confirmModal('清空全部数据？', '此操作会删除设置、连续学习天数、历史轮次、复习本、错题本与逐题统计，且无法恢复。', async ()=>{
      App.settings = defaultSettings();
      App.progress = defaultProgress();
      App.srs = {};
      App.session = null;
      await saveSettings();
      await saveProgress();
      await clearActiveSessionDraft();
      await Store.remove(STORAGE_KEYS.lastDeck);
      if (App.deck) await Store.remove('srs:'+App.deck.id);
      applyTheme();
      toast('已清空数据', {icon:'🗑️'});
      render();
    }, { danger:true, confirmLabel:'清空' });
  };
}
function sanitizeProgressForExport(progress){
  const out = Utils.deepClone(progress || defaultProgress());
  const deleted = new Set(out.deletedSessionIds || []);
  out.sessions = (out.sessions || []).filter(s=>s && s.id && !deleted.has(s.id));
  const totals = { totalSessions:0, totalQuestionsAnswered:0, totalScorePoints:0, totalMaxPoints:0, totalTimeMs:0 };
  const questionStats = {};
  out.sessions.forEach(s=>{
    totals.totalSessions++;
    totals.totalQuestionsAnswered += s.totalQuestions||0;
    totals.totalScorePoints += s.score||0;
    totals.totalMaxPoints += s.maxScore||0;
    totals.totalTimeMs += s.durationMs||0;
    const deckStats = questionStats[s.deckId] || (questionStats[s.deckId] = {});
    (s.details||[]).forEach(d=>{
      const cur = deckStats[d.uid] || (deckStats[d.uid] = {attempts:0, correct:0, wrong:0, mid:0});
      cur.attempts++;
      if (d.status==='ok') cur.correct++;
      else if (d.status==='mid') cur.mid++;
      else cur.wrong++;
      cur.lastStatus = d.status;
      cur.lastAt = Math.max(cur.lastAt||0, s.endedAt||s.startedAt||0);
    });
  });
  out.totals = totals;
  out.streak = recomputeStreakFromSessions(out.sessions);
  out.questionStats = questionStats;
  return out;
}
function exportAllData(){
  const progress = sanitizeProgressForExport(App.progress);
  Utils.downloadJSON(`SpacedMemoryCards_数据_${Utils.todayStr()}.json`, {
    _type:'smc-data',
    version:2,
    exportedAt:Date.now(),
    settings:App.settings,
    progress,
    deck:App.deck ? {id:App.deck.id, title:App.deck.meta.title} : null,
    srs:App.deck ? {[App.deck.id]:App.srs||{}} : {}
  });
  toast('数据已导出', {icon:'⬇️'});
}
function recomputeStreakFromSessions(sessions){
  const days = [...new Set(sessions.map(s=>Utils.todayStr(s.endedAt||s.startedAt)))].sort();
  let current=0, longest=0, prev=null;
  days.forEach(d=>{
    if (prev){
      const diffDays = Math.round((new Date(d)-new Date(prev))/86400000);
      current = diffDays===1 ? current+1 : 1;
    } else current = 1;
    longest = Math.max(longest, current);
    prev = d;
  });
  const today = Utils.todayStr(), yesterday = Utils.todayStr(Date.now()-86400000);
  const lastDay = days[days.length-1]||null;
  if (lastDay!==today && lastDay!==yesterday) current = 0;
  return { current, longest, lastDate:lastDay };
}
function rebuildProgressDerivedState(){
  const sessions = App.progress.sessions || [];
  const totals = { totalSessions:0, totalQuestionsAnswered:0, totalScorePoints:0, totalMaxPoints:0, totalTimeMs:0 };
  const questionStats = {};
  sessions.forEach(s=>{
    totals.totalSessions++;
    totals.totalQuestionsAnswered += s.totalQuestions||0;
    totals.totalScorePoints += s.score||0;
    totals.totalMaxPoints += s.maxScore||0;
    totals.totalTimeMs += s.durationMs||0;
    const deckStats = questionStats[s.deckId] || (questionStats[s.deckId] = {});
    (s.details||[]).forEach(d=>{
      const cur = deckStats[d.uid] || (deckStats[d.uid] = {attempts:0, correct:0, wrong:0, mid:0});
      cur.attempts++;
      if (d.status==='ok') cur.correct++;
      else if (d.status==='mid') cur.mid++;
      else cur.wrong++;
      cur.lastStatus = d.status;
      cur.lastAt = Math.max(cur.lastAt||0, s.endedAt||s.startedAt||0);
    });
  });
  App.progress.totals = totals;
  App.progress.streak = recomputeStreakFromSessions(sessions);
  App.progress.questionStats = questionStats;
}
async function deleteSessionRecord(id){
  App.progress.deletedSessionIds = Array.from(new Set([...(App.progress.deletedSessionIds||[]), id]));
  App.progress.sessions = (App.progress.sessions||[]).filter(s=>s.id!==id);
  rebuildProgressDerivedState();
  await saveProgress();
  toast('学习记录已删除', {icon:'−'});
  render();
}
async function importConfigObj(incoming, opts={}){
  if (!incoming || typeof incoming!=='object') throw new Error('文件内容不是合法的配置对象');
  const base = defaultSettings();
  App.settings = Object.assign({}, base, incoming, {
    includeTypes: Object.assign({}, base.includeTypes, incoming.includeTypes||{}),
    points: Object.assign({}, base.points, incoming.points||{})
  });
  await saveSettings();
  applyTheme();
  if (!opts.silent) toast('配置已导入', {icon:'✅'});
}
async function importHistoryObj(progressObj, opts={}){
  if (!progressObj || !Array.isArray(progressObj.sessions)) throw new Error('文件内容不是合法的学习记录');
  const deletedIds = new Set([...(App.progress.deletedSessionIds||[]), ...(progressObj.deletedSessionIds||[])]);
  App.progress.deletedSessionIds = [...deletedIds];
  const incomingSessions = progressObj.sessions;
  const existingIds = new Set(App.progress.sessions.map(s=>s.id));
  const newOnes = incomingSessions.filter(s=>s && s.id && !deletedIds.has(s.id) && !existingIds.has(s.id));
  const merged = App.progress.sessions
    .filter(s=>s && s.id && !deletedIds.has(s.id))
    .concat(newOnes)
    .sort((a,b)=>b.startedAt-a.startedAt)
    .slice(0,300);
  App.progress.sessions = merged;
  ['reviewBook','wrongBook'].forEach(k=>{
    App.progress[k] = App.progress[k] || {};
    const incoming = progressObj[k] || {};
    Object.keys(incoming).forEach(deckId=>{
      const set = new Set(normalizeUidList(App.progress[k][deckId]).concat(normalizeUidList(incoming[deckId])));
      App.progress[k][deckId] = [...set];
    });
  });
  rebuildProgressDerivedState();
  await saveProgress();
  if (!opts.silent) toast(`已导入并合并 ${newOnes.length} 条新记录`, {icon:'✅'});
}
async function importAllDataObj(obj){
  if (obj.settings) await importConfigObj(obj.settings, {silent:true});
  if (obj.progress) await importHistoryObj(obj.progress, {silent:true});
  if (obj.srs && App.deck && obj.srs[App.deck.id]){
    App.srs = Object.assign({}, App.srs||{}, obj.srs[App.deck.id]);
    await saveSrs();
  }
  toast('数据导入完成', {icon:'✅'});
}
async function importData(file){
  try{
    const text = await Utils.readFileAsText(file);
    const obj = JSON.parse(text);
    if (obj && obj._type==='smc-data') await importAllDataObj(obj);
    else if (obj && obj._type==='yika-config') await importConfigObj(obj.settings);
    else if (obj && obj._type==='yika-history') await importHistoryObj(obj.progress);
    else if (obj && obj.settings && obj.progress) await importAllDataObj(obj);
    else if (obj && obj.settings && !obj.progress) await importConfigObj(obj.settings); // 兼容无 _type 标记的旧配置文件
    else if (obj && obj.progress && Array.isArray(obj.progress.sessions)) await importHistoryObj(obj.progress); // 兼容无 _type 标记的旧记录文件
    else throw new Error('无法识别该文件，请确认选择的是本应用导出的数据 JSON。');
    render();
  }catch(e){ toast('导入失败：'+e.message, {icon:'⚠️', duration:3600}); }
}


/* ============================================================
   §18. 启动初始化
   ============================================================ */
async function initApp(){
  try{
    App.settings = await loadSettings();
    App.progress = await loadProgress();
    applyTheme();
    if (window.matchMedia){
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      const onSystemThemeChange = ()=>{ if ((App.settings.themeMode||'auto')==='auto'){ applyTheme(); renderNav(); } };
      if (mq.addEventListener) mq.addEventListener('change', onSystemThemeChange);
      else if (mq.addListener) mq.addListener(onSystemThemeChange);
    }

    App.localDecks = await loadLocalDeckFiles();
    const cachedDeck = await Store.getJSON(STORAGE_KEYS.lastDeck, null);
    const activeDraft = await Store.getJSON(STORAGE_KEYS.activeSession, null);
    let initialDeck = null;
    if (activeDraft && activeDraft.deckId){
      initialDeck = App.localDecks.find(d=>d.id===activeDraft.deckId) || (cachedDeck && cachedDeck.id===activeDraft.deckId ? cachedDeck : null);
    }
    if (!initialDeck && cachedDeck && Array.isArray(cachedDeck.questions) && cachedDeck.questions.length){
      initialDeck = App.localDecks.find(d=>d.id===cachedDeck.id) || cachedDeck;
    }
    if (!initialDeck && App.localDecks.length===1){
      initialDeck = App.localDecks[0];
    }

    if (initialDeck && Array.isArray(initialDeck.questions) && initialDeck.questions.length){
      App.deck = Utils.deepClone(initialDeck);
      App.srs = await loadSrs(App.deck.id);
      TYPE_ORDER.forEach(t=>{
        if (App.deck.byType[t] && App.deck.byType[t].length && !(t in App.settings.includeTypes)) App.settings.includeTypes[t]=true;
      });
      if (!App.settings.tfFilter){
        const pol = tfPolarityCounts(App.deck);
        App.settings.tfFilter = (pol.trueCount>0 && pol.falseCount>0) ? (pol.trueCount<=pol.falseCount?'true':'false') : 'all';
      }
      await registerDeck(App.deck);
      await Store.setJSON(STORAGE_KEYS.lastDeck, App.deck);
      if (activeDraft && activeDraft.deckId===App.deck.id && activeDraft.session && activeDraft.session.status==='active'){
        App.session = activeDraft.session;
        App.srs = activeDraft.srs || App.srs || {};
        App.view = App.session.phase==='grading' ? 'grading' : 'quiz';
      } else {
        App.view = 'setup';
      }
    } else {
      App.view = 'load';
    }
  }catch(e){
    console.error('初始化失败，回退到默认状态', e);
    App.settings = App.settings || defaultSettings();
    App.progress = App.progress || defaultProgress();
    App.view = 'load';
  }
  render();
}
initApp();
</script>
